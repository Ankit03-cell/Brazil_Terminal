const { useState, useEffect, useCallback, useRef, createContext, useContext, useMemo } = React;

// ─── API Layer ────────────────────────────────────────────────
// API base: use same origin (works with cloudflared tunnel and HTTPS).
// When the page is opened from the file system, fall back to local dev API.
const API = (window.location.protocol === 'file:')
    ? 'http://127.0.0.1:8000/api'
    : `${window.location.origin}/api`;

function toYMD(dateLike) {
    if (!dateLike) return '';
    const s = String(dateLike);
    const m = s.match(/^(\d{4}-\d{2}-\d{2})/);
    return m ? m[1] : s.slice(0, 10);
}

const api = {
    metadata: () => fetch(`${API}/metadata`, { cache: 'no-store' }).then(r => r.json()),
    spreads: (tenor, date, showAll) => fetch(`${API}/spreads?tenor=${tenor}&date=${date}&show_all=${showAll}`).then(r => r.json()),
    spreadsPast: (tenor, date, n1, n2, n3, showAll) => fetch(`${API}/spreads/past?tenor=${tenor}&date=${date}&n1=${n1}&n2=${n2}&n3=${n3}&show_all=${showAll}`).then(r => r.json()),
    spreadsHistory: (tenor, date, lookback, rank, filter) => fetch(`${API}/spreads/history?tenor=${tenor}&date=${date}&lookback=${lookback}&rank=${rank}&filter=${filter}`).then(r => r.json()),
    flies: (tenor, date, showAll) => fetch(`${API}/flies?tenor=${tenor}&date=${date}&show_all=${showAll}`).then(r => r.json()),
    fliesPast: (tenor, date, n1, n2, n3, showAll) => fetch(`${API}/flies/past?tenor=${tenor}&date=${date}&n1=${n1}&n2=${n2}&n3=${n3}&show_all=${showAll}`).then(r => r.json()),

    exportUrl: (tenor, date, lookback) => `${API}/export?tenor=${tenor}&date=${date}&lookback=${lookback}`,
    fra: (date) => fetch(`${API}/fra?date=${date}`).then(r => r.json()),
    fraSpreadsOnDate: (tenor, fOnly, date) => fetch(`${API}/fra/spreads?tenor=${tenor}&f_only=${fOnly}&date=${date}`).then(r => r.json()),
    fraSpreadsPast: (tenor, fOnly, date, n1, n2, n3) => fetch(`${API}/fra/spreads/past?tenor=${tenor}&f_only=${fOnly}&date=${date}&n1=${n1}&n2=${n2}&n3=${n3}`).then(r => r.json()),
    fraSpreadsHistory: (tenor, fOnly, date, lookback) => fetch(`${API}/fra/spreads/history?tenor=${tenor}&f_only=${fOnly}&date=${date}&lookback=${lookback}`).then(r => r.json()),
    fraFliesHistory: (tenor, fOnly, date, lookback) => fetch(`${API}/fra/flies/history?tenor=${tenor}&f_only=${fOnly}&date=${date}&lookback=${lookback}`).then(r => r.json()),
};

// ─── Format Short Name ────────────────────────────────────────
function formatShortName(name, isSpread = true) {
    if (!name) return name;
    if (isSpread) {
        const parts = name.split('-');
        if (parts.length === 2) {
            const m1 = parts[0].match(/OD([A-Z])(\d{2})/);
            const m2 = parts[1].match(/OD([A-Z])(\d{2})/);
            if (m1 && m2) {
                const month = m1[1];
                const y1Str = m1[2];
                const y2Str = m2[2];
                const y1 = parseInt(y1Str, 10);
                const y2 = parseInt(y2Str, 10);
                const diff = y2 - y1;
                const tenorCode = diff === 1 ? '4' : (diff === 2 ? '8' : String(diff));
                return `DI1${month}${y1Str}${tenorCode}S`;
            }
        }
    } else {
        const m = name.match(/OD([A-Z])(\d{2}) (\d+)M Fly/);
        if (m) {
            const month = m[1];
            const y1Str = m[2];
            const tenor = parseInt(m[3], 10);
            const tenorCode = tenor === 12 ? '4' : (tenor === 24 ? '8' : String(tenor));
            return `DI1${month}${y1Str}${tenorCode}`;
        }
    }
    return name;
}

function flipSeriesSign(values) {
    return values.map(value => typeof value === 'number' ? -value : value);
}

const CONTRACT_MONTH_ORDER = { F: 1, G: 2, H: 3, J: 4, K: 5, M: 6, N: 7, Q: 8, U: 9, V: 10, X: 11, Z: 12 };

function flyLabelSortKey(label) {
    const m = String(label || '').match(/OD([FGHJKMNQUVXZ])(\d{2})/);
    if (!m) return Number.MAX_SAFE_INTEGER;
    const monthNum = CONTRACT_MONTH_ORDER[m[1]] || 99;
    const year = 2000 + Number(m[2]);
    return (year * 100) + monthNum;
}

// ─── Theme Context ────────────────────────────────────────────
const ThemeContext = createContext();

    return useMemo(() => ({
        paper: 'transparent',
        plot: isDark ? 'rgba(12,18,28,0.78)' : 'rgba(255,255,255,0.9)',
        panel: isDark ? 'rgba(15,24,36,0.92)' : 'rgba(255,255,255,0.96)',

        gridDot: isDark ? 'rgba(148,163,184,0.14)' : 'rgba(30,41,59,0.1)',
        text: isDark ? '#a9b8cc' : '#5b6778',
        textStrong: isDark ? '#e6edf7' : '#111827',
        spike: isDark ? '#5f7087' : '#c1ccd9',
        border: isDark ? 'rgba(148,163,184,0.2)' : 'rgba(100,116,139,0.2)',
        borderStrong: isDark ? 'rgba(148,163,184,0.34)' : 'rgba(100,116,139,0.3)',

// ─── Base Layout for all Charts ───────────────────────────────
function makeLayout(c, overrides = {}) {
    return {
        paper_bgcolor: c.paper,
        plot_bgcolor: c.plot,
        font: { ...c.font, color: c.text },
        hovermode: 'x unified',
        dragmode: 'pan',
        hoverlabel: { bgcolor: 'rgba(15,23,42,0.96)', bordercolor: c.borderStrong, font: { family: 'Inter', size: 12, color: '#f1f5f9' } },
        margin: { l: 56, r: 28, t: 20, b: 62 },
        showlegend: true,
        legend: { orientation: 'h', yanchor: 'bottom', y: 1.03, xanchor: 'left', x: 0, font: { size: 11, color: c.text }, bgcolor: 'rgba(0,0,0,0)' },
        xaxis: { showgrid: false, zeroline: false, showline: true, linecolor: c.border, linewidth: 1, tickfont: { color: c.text, size: 11 }, ticklen: 5, automargin: true, showspikes: true, spikecolor: c.spike, spikethickness: 0.9, spikemode: 'across', spikesnap: 'cursor' },
        yaxis: { showgrid: true, gridcolor: c.grid, griddash: 'dot', gridwidth: 1, zerolinecolor: c.borderStrong, zerolinewidth: 1, tickfont: { color: c.text, size: 11 }, ticklen: 5, automargin: true, showspikes: true, spikecolor: c.spike, spikethickness: 0.9 },
        transition: { duration: 650, easing: 'cubic-in-out', ordering: 'traces first' },
        ...overrides,
    };
}

// ─── PlotlyChart Component ───────────────────────────────────
function PlotlyChart({ data, layout, style, config, onPointClick, className = '' }) {
    const ref = useRef(null);
    const { isDark } = useContext(ThemeContext);
    const c = useChartTheme();

    useEffect(() => {
        if (!ref.current || !data) return;
        const finalLayout = makeLayout(c, layout);
        const finalConfig = {
            responsive: true,
            displayModeBar: 'hover',
            displaylogo: false,
            scrollZoom: false,
            doubleClick: 'reset+autosize',
            modeBarButtonsToRemove: ['lasso2d', 'select2d', 'autoScale2d', 'toggleSpikelines'],
            ...config
        };
        Plotly.react(ref.current, data, finalLayout, finalConfig);
    }, [data, layout, isDark]);

    useEffect(() => {
        if (!ref.current || !onPointClick) return;
        const handler = (event) => {
            const point = event?.points?.[0];
            if (!point) return;
            onPointClick(point);
        };
        ref.current.on('plotly_click', handler);
        return () => {
            if (ref.current) ref.current.removeListener('plotly_click', handler);
        };
    }, [onPointClick, data, layout, isDark]);

    return <div ref={ref} className={`plotly-chart ${className}`.trim()} style={{ width: '100%', borderRadius: 12, overflow: 'hidden', ...style }} />;
}

function EChart({ option, style, className = '' }) {
    const ref = useRef(null);

    useEffect(() => {
        if (!ref.current || !window.echarts || !option) return;
        const chart = window.echarts.getInstanceByDom(ref.current) || window.echarts.init(ref.current, null, { renderer: 'canvas' });
        chart.setOption(option, true);
        const onResize = () => chart.resize();
        window.addEventListener('resize', onResize);
        return () => {
            window.removeEventListener('resize', onResize);
        };
    }, [option]);

    return <div ref={ref} className={`echart ${className}`.trim()} style={{ width: '100%', ...style }} />;
}

// ─── MetricCard Component ─────────────────────────────────────
function MetricCard({ label, value, delta, prefix = '', className = '' }) {
    const isPos = delta >= 0;
    return (
        <div className={`metric-card ${className}`}>
            <div className="label">{label}</div>
            <div className="value">{prefix}{typeof value === 'number' ? value.toFixed(1) : value}</div>
            {delta !== undefined && (
                <div className={`delta ${isPos ? 'positive' : 'negative'}`}>
                    {isPos ? '▲' : '▼'} {Math.abs(delta).toFixed(2)} bps
                </div>
            )}
        </div>
    );
}

    return (

// ─── DataTable Component ──────────────────────────────────────
function DataTable({ data, columns, title }) {
    const [sortCol, setSortCol] = useState(null);
    const [sortDir, setSortDir] = useState('asc');
    const [expanded, setExpanded] = useState(false);

    const handleSort = (col) => {
        if (sortCol === col) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
        else { setSortCol(col); setSortDir('asc'); }
    };

    const sorted = [...data].sort((a, b) => {
        if (!sortCol) return 0;
        const va = a[sortCol], vb = b[sortCol];
        const cmp = typeof va === 'number' ? va - vb : String(va).localeCompare(String(vb));
        return sortDir === 'asc' ? cmp : -cmp;
    });

    if (!data.length) return null;

    return (
        <div style={{ marginTop: 16 }}>
            <button onClick={() => setExpanded(!expanded)} style={{
                background: 'transparent', border: 'none', color: 'var(--text-secondary)',
                cursor: 'pointer', fontFamily: 'Inter', fontSize: 12, fontWeight: 600,
                display: 'flex', alignItems: 'center', gap: 6, padding: '6px 0'
            }}>
                {expanded ? '▾' : '▸'} {title || 'Data Table'} ({data.length} rows)
            </button>
            {expanded && (
                <div className="data-table-wrapper" style={{ maxHeight: 400, overflowY: 'auto' }}>
                    <table className="data-table">
                        <thead>
                            <tr>
                                {columns.map(col => (
                                    <th key={col.key} className={sortCol === col.key ? 'sorted' : ''} onClick={() => handleSort(col.key)}>
                                        {col.label} <span className="sort-icon">{sortCol === col.key ? (sortDir === 'asc' ? '▲' : '▼') : '⇅'}</span>
                                    </th>
                                ))}
                            </tr>
                        </thead>
                        <tbody>
                            {sorted.map((row, i) => (
                                <tr key={i}>
                                    {columns.map(col => (
                                        <td key={col.key} className={col.color ? (row[col.key] >= 0 ? 'val-positive' : 'val-negative') : ''}>
                                            {col.format ? col.format(row[col.key]) : row[col.key]}
                                        </td>
                                    ))}
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            )}
        </div>
    );
}

// ─── SpreadStation Component ──────────────────────────────────
function SpreadStation({ tenor, params, showHistorySection = true }) {
    const [spreads, setSpreads] = useState(null);
    const [past, setPast] = useState(null);
    const [history, setHistory] = useState(null);
    const [stats, setStats] = useState(null);
    const [pinnedCurves, setPinnedCurves] = useState([]);
    const [showAll, setShowAll] = useState(false);
    const [showHistoryCurves, setShowHistoryCurves] = useState(false);
    const [histMode, setHistMode] = useState('F');
    const [histRank, setHistRank] = useState(1);
    // Historical spreads are computed server-side as Front - Back; no client-side inversion
    const [loading, setLoading] = useState(true);
    const [showCurveInfo, setShowCurveInfo] = useState(false);
    const [showHistInfo, setShowHistInfo] = useState(false);
    const c = useChartTheme();

    const load = useCallback(async () => {
        setLoading(true);
        try {
            const [s, p, h, st] = await Promise.all([
                api.spreads(tenor, params.date, showAll),
                api.spreadsPast(tenor, params.date, params.n1, params.n2, params.n3, showAll),
                api.spreadsHistory(tenor, params.date, params.lookback, histRank, histMode),
                api.stats(tenor, params.date, params.lookback)
            ]);
            setSpreads(s); setPast(p); setHistory(h); setStats(st);
        } catch (e) { console.error(e); }
        setLoading(false);
    }, [tenor, params.date, params.lookback, params.n1, params.n2, params.n3, showAll, histMode, histRank]);

    useEffect(() => { load(); }, [load]);

    const handlePinCurrentCurve = useCallback(() => {
        const targetDate = spreads?.date || params.date;
        if (!targetDate) return;
        if (pinnedCurves.some(p => p.date === targetDate && p.tenor === tenor && p.showAll === showAll)) return;
        api.spreads(tenor, targetDate, showAll)
            .then((res) => {
                if (!res?.data?.length) return;
                setPinnedCurves(prev => [...prev, { date: res.date || targetDate, tenor, showAll, data: res.data }]);
            })
            .catch(console.error);
    }, [spreads?.date, params.date, pinnedCurves, tenor, showAll]);

    if (loading && !spreads?.data?.length) return <div className="loading-overlay"><div className="spinner" /> Loading spread data...</div>;
    if (!spreads?.data?.length) return <div className="loading-overlay">No data available for this date.</div>;

    // Curve traces
    const curveTraces = [];
    const validPairs = new Set(spreads.data.map(d => d.pair));
    
    if (showHistoryCurves) {
        const pastEntries = past ? Object.entries(past) : [];
        pastEntries.forEach(([key, val], i) => {
            if (val.data?.length) {
                const filtered = val.data.filter(d => validPairs.has(d.pair));
                curveTraces.push({
                    x: filtered.map(d => formatShortName(d.pair, true)), y: filtered.map(d => d.value),
                    name: val.date, mode: 'lines',
                    line: { color: c.past[i % 3], width: 1.5, shape: 'spline', smoothing: 0.8 },
                    hovertemplate: '<b>%{x}</b><br>' + key.toUpperCase() + ' (' + val.date + '): %{y:.2f} bps<extra></extra>'
                });
            }
        });
    }

    const getPinnedColor = (index) => {
        const hue = (index * 47 + 22) % 360;
        return `hsla(${hue}, 72%, 72%, 0.72)`;
    };
    const activePinned = pinnedCurves
        .filter(p => p.tenor === tenor && p.showAll === showAll)
        .filter(p => p.date !== spreads?.date);
    const isCurrentPinned = pinnedCurves.some(
        p => p.date === (spreads?.date || params.date) && p.tenor === tenor && p.showAll === showAll
    );
    activePinned.forEach((pinned, i) => {
        const pinnedRows = pinned.data || [];
        if (!pinnedRows.length) return;
        const xSlots = spreads.data.map(d => formatShortName(d.pair, true));
        const yAligned = xSlots.map((_, idx) => (idx < pinnedRows.length ? pinnedRows[idx].value : null));
        const pinnedPairs = xSlots.map((_, idx) => (idx < pinnedRows.length ? formatShortName(pinnedRows[idx].pair, true) : null));
        curveTraces.push({
            x: xSlots, y: yAligned, customdata: pinnedPairs,
            name: `Pinned ${i + 1} (${pinned.date})`, mode: 'lines',
            showSymbol: true, symbol: 'circle', symbolSize: 3,
            line: { color: getPinnedColor(i), width: 1.6, shape: 'spline', smoothing: 0.8, dash: 'dashed', opacity: 0.72 },
            hovertemplate: '<b>%{x}</b><br>Pinned ' + (i + 1) + ' (' + pinned.date + '): <b>%{y:.2f} bps</b><br>Pinned Pair: %{customdata}<extra></extra>'
        });
    });

    curveTraces.push({
        x: spreads.data.map(d => formatShortName(d.pair, true)), y: spreads.data.map(d => d.value),
        name: 'Selected (' + spreads.date + ')', mode: 'lines+markers',
        line: { color: c.primary, width: 3, shape: 'spline', smoothing: 0.8 },
        marker: { size: 7, color: c.primary, line: { width: 2, color: c.plot } },
        hovertemplate: '<b>%{x}</b><br>Selected (' + spreads.date + '): <b>%{y:.2f} bps</b><extra></extra>'
    });

    // Master Sort Order for X-Axis (strictly identical to Today's active contracts)
    const masterSpreadCats = spreads.data.map(d => formatShortName(d.pair, true));

    // Metrics
    const nearest = spreads.data[0]?.value || 0;
    const maxVal = Math.max(...spreads.data.map(d => d.value));
    const nearestChg = spreads.data[0]?.chg || 0;

    // History traces
    const histTraces = [];
    if (history?.data?.length) {
        const histDates = history.data.map(d => d.date);
        const histValsRaw = history.data.map(d => d.value);
        const histValues = histValsRaw;
        const ma20 = history.bands?.ma_20 ? history.bands.ma_20 : [];
        const ma60 = history.bands?.ma_60 ? history.bands.ma_60 : [];
        const upper20 = history.bands?.upper_20 ? history.bands.upper_20 : [];
        const lower20 = history.bands?.lower_20 ? history.bands.lower_20 : [];

        histTraces.push({
            x: histDates, y: histValues,
            name: 'Spread', line: { color: c.primary, width: 2.5, shape: 'spline', smoothing: 0.6 },
            fill: 'tozeroy', fillcolor: c.primaryFill,
            hovertemplate: '%{y:.2f} bps<extra></extra>'
        });
        if (history.bands?.ma_20) {
            histTraces.push({ x: histDates, y: ma20, name: 'MA-20', line: { color: c.ma1, width: 1.5, dash: 'dot' } });
        }
        if (history.bands?.ma_60) {
            histTraces.push({ x: histDates, y: ma60, name: 'MA-60', line: { color: c.ma2, width: 1.5, dash: 'dot' } });
        }
        if (history.bands?.upper_20 && history.bands?.lower_20) {
            histTraces.push({ x: histDates, y: upper20, name: '+2σ', line: { color: c.ma1, width: 0.5 }, showlegend: false });
            histTraces.push({ x: histDates, y: lower20, name: '-2σ', line: { color: c.ma1, width: 0.5 }, fill: 'tonexty', fillcolor: c.bandFill, showlegend: false });
        }
    }
    if (history?.index?.length) {
        histTraces.push({
            x: history.index.map(d => d.date), y: history.index.map(d => d.value),
            name: 'Policy Rate', yaxis: 'y2',
            line: { color: c.overlay, width: 1.5, dash: 'dot' },
            hovertemplate: 'Rate: %{y:.2f}<extra></extra>'
        });
    }

    const spreadCurveOption = buildCategoryLineOption({
        categories: masterSpreadCats,
        traces: curveTraces,
        c,
        yAxisName: 'Spread (bps)'
    });
    const spreadHistoryOption = buildTimeSeriesOption({
        c,
        yAxisName: 'Spread (bps)',
        overlayName: 'Policy Rate',
        series: histTraces.map(trace => ({
            name: trace.name,
            data: trace.x.map((x, i) => [x, trace.y[i]]),
            lineStyle: { color: trace.line.color, width: trace.line.width || 1.5, type: trace.line.dash ? 'dashed' : 'solid' },
            itemStyle: { color: trace.line.color },
            areaStyle: trace.fillcolor ? { color: trace.fillcolor } : undefined,
            yAxisIndex: trace.yaxis === 'y2' ? 1 : 0,
            showSymbol: false,
            smooth: trace.yaxis === 'y2' ? 0 : 0.26,
        }))
    });

    // Stats table
    const tableColumns = [
        { key: 'pair', label: 'Spread Pair', format: v => formatShortName(v, true) },
        { key: 'value', label: 'Value', format: v => v?.toFixed(2) },
        { key: 'chg_1d', label: '1D Chg', format: v => v?.toFixed(2), color: true },
        { key: 'z_score', label: 'Z-Score', format: v => v?.toFixed(2), color: true },
        { key: 'percentile', label: 'Pctl', format: v => `${v?.toFixed(0)}%` },
        { key: 'min', label: 'Min', format: v => v?.toFixed(2) },
        { key: 'max', label: 'Max', format: v => v?.toFixed(2) },
    ];

    return (
        <div>
            <div className="metrics-row">
                <MetricCard label={`Nearest ${tenor}M`} value={nearest} delta={nearestChg} className="fade-in fade-in-1" />
                <MetricCard label="Peak Spread" value={maxVal} className="fade-in fade-in-2" />
                <MetricCard label="Active Nodes" value={spreads.data.length} className="fade-in fade-in-3" />
                {stats?.data?.[0] && <MetricCard label="Z-Score" value={stats.data[0].z_score} className="fade-in fade-in-4" />}
            </div>

            <div className="terminal-card fade-in fade-in-2">
                <div className="card-header">
                    <div className="card-title"><span className="accent">|</span> {tenor}M SPREAD CURVE</div>
                    <div className="card-actions">
                        <button className={`info-btn ${showCurveInfo ? 'active' : ''}`} onClick={() => setShowCurveInfo(!showCurveInfo)} title="Chart Explanation">ⓘ</button>
                        <label className="toggle-switch">
                            <input type="checkbox" checked={showHistoryCurves} onChange={e => setShowHistoryCurves(e.target.checked)} />
                            <span className="toggle-track" />
                            History
                        </label>
                        <label className="toggle-switch">
                            <input type="checkbox" checked={showAll} onChange={e => setShowAll(e.target.checked)} />
                            <span className="toggle-track" />
                            Show All
                        </label>
                        <button
                            className="btn-export"
                            style={{
                                padding: '8px 12px',
                                background: isCurrentPinned ? 'rgba(var(--accent-rgb), 0.18)' : undefined,
                                borderColor: isCurrentPinned ? 'var(--accent)' : undefined,
                                color: isCurrentPinned ? 'var(--text-accent)' : undefined
                            }}
                            onClick={handlePinCurrentCurve}
                        >
                            {isCurrentPinned ? 'Pinned' : 'Pin This Graph'}
                        </button>
                        {activePinned.length > 0 && (
                            <button className="btn-export" style={{ padding: '8px 12px' }} onClick={() => setPinnedCurves(prev => prev.filter(p => !(p.tenor === tenor && p.showAll === showAll)))}>Clear Pins</button>
                        )}
                    </div>
                </div>
                <InfoPanel visible={showCurveInfo} text={`
                    <strong>Spread Curve</strong> shows the current term structure of ${tenor}-month calendar spreads.<br/>
                    • The <strong>bright line (Today)</strong> shows live spread values across each maturity node.<br/>
                    • The <strong>muted lines</strong> show where the curve sat n1, n2, and n3 days ago for comparison.
                `} />
                <div className="chart-stack">
                    <ChartSurface eyebrow="Current Structure" title="Curve Snapshot" note={`${spreads.data.length} active nodes`}>
                        {activePinned.length > 0 && (
                            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, marginBottom: 8 }}>
                                {activePinned.map((pin, idx) => (
                                    <span
                                        key={`${pin.tenor}-${pin.showAll}-${pin.date}`}
                                        style={{ display: 'inline-flex', alignItems: 'center', gap: 6, fontSize: 11, color: 'var(--text-secondary)', border: `1px solid ${c.border}`, borderRadius: 999, padding: '4px 10px', background: 'rgba(0,0,0,0.22)' }}
                                    >
                                        <span style={{ width: 8, height: 8, borderRadius: '50%', background: getPinnedColor(idx), display: 'inline-block' }} />
                                        {`Pinned ${idx + 1}: ${pin.date}`}
                                    </span>
                                ))}
                            </div>
                        )}
                        <EChart option={spreadCurveOption} style={{ height: 348 }} />
                    </ChartSurface>
                </div>
                <DataTable data={stats?.data || []} columns={tableColumns} title="Spread Analysis Table" />
            </div>

            {showHistorySection && (<div className="terminal-card fade-in fade-in-3">
                <div className="card-header">
                    <div className="card-title"><span className="accent">|</span> HISTORICAL {tenor}M TREND</div>
                    <div className="card-actions">
                        <button className={`info-btn ${showHistInfo ? 'active' : ''}`} onClick={() => setShowHistInfo(!showHistInfo)} title="Chart Explanation">ⓘ</button>
                        <a href={api.exportUrl(tenor, params.date, params.lookback)} className="btn-export">📥 Export</a>
                    </div>
                </div>
                <InfoPanel visible={showHistInfo} text={`
                    <strong>Historical Trend</strong> shows how the generic (constant-maturity) spread evolved over time.<br/>
                    • <strong>MA-20</strong> (blue dotted): 20-day moving average — short-term trend direction.<br/>
                    • <strong>MA-60</strong> (amber dotted): 60-day moving average — medium-term regime.<br/>
                    • <strong>Bollinger Bands</strong> (shaded area): ±2 standard deviations around MA-20. Price outside the band signals extreme positioning.<br/>
                    • <strong>Policy Rate</strong> (overlay): Central bank reference rate for macro context.<br/>
                    • <strong>Filter</strong>: "F-Only" uses January contracts (most liquid). "All" uses every month.<br/>
                    • <strong>Bucket</strong>: Which position on the curve — 1 = nearest maturity, 2 = second nearest, etc.
                `} />
                <div className="controls-row">
                    <div className="control-group">
                        <label>Filter</label>
                        <select value={histMode} onChange={e => setHistMode(e.target.value)}>
                            <option value="F">F-Only (Jan)</option>
                            <option value="all">All Months</option>
                        </select>
                    </div>
                    <div className="control-group">
                        <label>Bucket</label>
                        <input
                            type="number"
                            min="1"
                            max="50"
                            value={histRank}
                            onChange={e => setHistRank(Math.max(1, Number(e.target.value)))}
                            style={{
                                width: 60,
                                background: 'var(--bg-card)',
                                border: '1px solid var(--grid)',
                                color: 'var(--text-primary)',
                                borderRadius: 4,
                                padding: '4px 8px',
                                fontSize: 13,
                                fontFamily: 'Inter'
                            }}
                        />
                    </div>
                    {/* No client-side inversion toggle: historical spreads are front - back */}

                </div>
                <ChartSurface eyebrow="Rolling History" title="Generic Trend" note={`Bucket ${histRank} • ${histMode === 'F' ? 'F-Only' : 'All Months'}`}>
                    <EChart option={spreadHistoryOption} style={{ height: 394 }} />
                </ChartSurface>
            </div>)}
        </div>
    );
}

// ─── FlyStation Component ─────────────────────────────────────
function FlyStation({ tenor, params, showHistorySection = true }) {
    const [flies, setFlies] = useState(null);
    const [past, setPast] = useState(null);
    const [history, setHistory] = useState(null);
    const [pinnedCurves, setPinnedCurves] = useState([]);
    const [showAll, setShowAll] = useState(false);
    const [showHistoryCurves, setShowHistoryCurves] = useState(false);
    const [histMode, setHistMode] = useState('F');
    const [histRank, setHistRank] = useState(1);
    // Flies: historical fly values are computed server-side as frontSpread - backSpread
    const [loading, setLoading] = useState(true);
    const [showCurveInfo, setShowCurveInfo] = useState(false);
    const [showHistInfo, setShowHistInfo] = useState(false);
    const c = useChartTheme();

    const load = useCallback(async () => {
        setLoading(true);
        try {
            const [f, p, h] = await Promise.all([
                api.flies(tenor, params.date, showAll),
                api.fliesPast(tenor, params.date, params.n1, params.n2, params.n3, showAll),
                api.fliesHistory(tenor, params.date, params.lookback, histRank, histMode),
            ]);
            setFlies(f); setPast(p); setHistory(h);
        } catch (e) { console.error(e); }
        setLoading(false);
    }, [tenor, params.date, params.lookback, params.n1, params.n2, params.n3, showAll, histMode, histRank]);

    useEffect(() => { load(); }, [load]);

    const handlePinCurrentCurve = useCallback(() => {
        const targetDate = flies?.date || params.date;
        if (!targetDate) return;
        if (pinnedCurves.some(p => p.date === targetDate && p.tenor === tenor && p.showAll === showAll)) return;
        api.flies(tenor, targetDate, showAll)
            .then((res) => {
                if (!res?.data?.length) return;
                setPinnedCurves(prev => [...prev, { date: res.date || targetDate, tenor, showAll, data: res.data }]);
            })
            .catch(console.error);
    }, [flies?.date, params.date, pinnedCurves, tenor, showAll]);

    if (loading && !flies?.data?.length) return <div className="loading-overlay"><div className="spinner" /> Loading fly data...</div>;
    if (!flies?.data?.length) return <div className="loading-overlay">No fly data available.</div>;

    const curveTraces = [];
    const validFlies = new Set(flies.data.map(d => d.name));
    if (showHistoryCurves) {
        const pastEntries = past ? Object.entries(past) : [];
        pastEntries.forEach(([key, val], i) => {
            if (val.data?.length) {
                const filtered = val.data.filter(d => validFlies.has(d.name));
                curveTraces.push({
                    x: filtered.map(d => formatShortName(d.name, false)), y: filtered.map(d => d.value),
                    name: val.date, mode: 'lines',
                    line: { color: c.past[i % 3], width: 2, shape: 'spline', smoothing: 0.8 },
                    hovertemplate: '<b>%{x}</b><br>%{y:.2f} bps<extra></extra>'
                });
            }
        });
    }
    const getPinnedColor = (index) => {
        const hue = (index * 47 + 22) % 360;
        return `hsla(${hue}, 72%, 72%, 0.72)`;
    };
    const activePinned = pinnedCurves
        .filter(p => p.tenor === tenor && p.showAll === showAll)
        .filter(p => p.date !== flies?.date);
    const isCurrentPinned = pinnedCurves.some(
        p => p.date === (flies?.date || params.date) && p.tenor === tenor && p.showAll === showAll
    );
    activePinned.forEach((pinned, i) => {
        const pinnedRows = pinned.data || [];
        if (!pinnedRows.length) return;
        const xSlots = flies.data.map(d => formatShortName(d.name, false));
        const yAligned = xSlots.map((_, idx) => (idx < pinnedRows.length ? pinnedRows[idx].value : null));
        const pinnedNames = xSlots.map((_, idx) => (idx < pinnedRows.length ? formatShortName(pinnedRows[idx].name, false) : null));
        curveTraces.push({
            x: xSlots, y: yAligned, customdata: pinnedNames,
            name: `Pinned ${i + 1} (${pinned.date})`, mode: 'lines',
            showSymbol: true, symbol: 'circle', symbolSize: 3,
            line: { color: getPinnedColor(i), width: 1.6, shape: 'spline', smoothing: 0.8, dash: 'dashed', opacity: 0.72 },
            hovertemplate: '<b>%{x}</b><br>Pinned ' + (i + 1) + ' (' + pinned.date + '): <b>%{y:.2f} bps</b><br>Pinned Fly: %{customdata}<extra></extra>'
        });
    });
    curveTraces.push({
        x: flies.data.map(d => formatShortName(d.name, false)), y: flies.data.map(d => d.value),
        name: 'Today', mode: 'lines+markers',
        line: { color: c.primary, width: 3, shape: 'spline', smoothing: 0.8 },
        marker: { size: 7, color: c.primary, line: { width: 2, color: c.plot } },
        hovertemplate: '<b>%{x}</b><br><b>%{y:.2f} bps</b><extra></extra>'
    });

    // Master Sort Order for X-Axis (strictly identical to Today's active contracts)
    const masterFlyCats = flies.data.map(d => formatShortName(d.name, false));

    // Compute MA and Bollinger bands on frontend for fly history (for consistency with spread history)
    function computeBands(values) {
        const bands = {};
        if (values.length >= 20) {
            bands.ma_20 = values.map((_, i) => {
                if (i < 19) return null;
                let s = 0; for (let j = i-19; j <= i; j++) s += values[j]; return s/20;
            });
            const std20 = values.map((_, i) => {
                if (i < 19 || !bands.ma_20[i]) return null;
                let s = 0; for (let j = i-19; j <= i; j++) s += (values[j] - bands.ma_20[i])**2;
                return Math.sqrt(s/20);
            });
            bands.upper_20 = bands.ma_20.map((m, i) => m !== null ? m + 2*std20[i] : null);
            bands.lower_20 = bands.ma_20.map((m, i) => m !== null ? m - 2*std20[i] : null);
        }
        if (values.length >= 60) {
            bands.ma_60 = values.map((_, i) => {
                if (i < 59) return null;
                let s = 0; for (let j = i-59; j <= i; j++) s += values[j]; return s/60;
            });
        }
        return bands;
    }

    const histTraces = [];
    if (history?.data?.length) {
        const flyDates = history.data.map(d => d.date);
        const flyValsRaw = history.data.map(d => d.value);
        const flyValues = flyValsRaw;
        const bands = computeBands(flyValues);

        histTraces.push({
            x: flyDates, y: flyValues,
            name: 'Fly', line: { color: c.primary, width: 2.5, shape: 'spline', smoothing: 0.6 },
            fill: 'tozeroy', fillcolor: c.primaryFill,
            hovertemplate: '%{y:.2f} bps<extra></extra>'
        });
        if (bands.ma_20) {
            histTraces.push({ x: flyDates, y: bands.ma_20, name: 'MA-20', line: { color: c.ma1, width: 1.5, dash: 'dot' } });
        }
        if (bands.ma_60) {
            histTraces.push({ x: flyDates, y: bands.ma_60, name: 'MA-60', line: { color: c.ma2, width: 1.5, dash: 'dot' } });
        }
        if (bands.upper_20 && bands.lower_20) {
            histTraces.push({ x: flyDates, y: bands.upper_20, name: '+2σ', line: { color: c.ma1, width: 0.5 }, showlegend: false });
            histTraces.push({ x: flyDates, y: bands.lower_20, name: '-2σ', line: { color: c.ma1, width: 0.5 }, fill: 'tonexty', fillcolor: c.bandFill, showlegend: false });
        }
    }
    if (history?.index?.length) {
        histTraces.push({
            x: history.index.map(d => d.date), y: history.index.map(d => d.value),
            name: 'Policy Rate', yaxis: 'y2',
            line: { color: c.overlay, width: 1.5, dash: 'dot' },
            hovertemplate: 'Rate: %{y:.2f}<extra></extra>'
        });
    }

    const flyCurveOption = buildCategoryLineOption({
        categories: masterFlyCats,
        traces: curveTraces,
        c,
        yAxisName: 'Fly (bps)',
        zeroLine: true
    });
    const flyHistoryOption = buildTimeSeriesOption({
        c,
        yAxisName: 'Fly (bps)',
        overlayName: 'Policy Rate',
        zeroLine: true,
        series: histTraces.map(trace => ({
            name: trace.name,
            data: trace.x.map((x, i) => [x, trace.y[i]]),
            lineStyle: { color: trace.line.color, width: trace.line.width || 1.5, type: trace.line.dash ? 'dashed' : 'solid' },
            itemStyle: { color: trace.line.color },
            areaStyle: trace.fillcolor ? { color: trace.fillcolor } : undefined,
            yAxisIndex: trace.yaxis === 'y2' ? 1 : 0,
            showSymbol: false,
            smooth: trace.yaxis === 'y2' ? 0 : 0.26,
        }))
    });

    const currentFly = flies.data[0]?.value || 0;
    const flyValues = flies.data.map(d => d.value);

    return (
        <div>
            <div className="metrics-row">
                <MetricCard label={`Nearest ${tenor}M Fly`} value={currentFly} delta={flies.data[0]?.chg} className="fade-in fade-in-1" />
                <MetricCard label="Max Curvature" value={Math.max(...flyValues)} className="fade-in fade-in-2" />
                <MetricCard label="Min Curvature" value={Math.min(...flyValues)} className="fade-in fade-in-3" />
                <MetricCard label="Fly Nodes" value={flies.data.length} className="fade-in fade-in-4" />
            </div>

            <div className="terminal-card fade-in fade-in-2">
                <div className="card-header">
                    <div className="card-title"><span className="accent">|</span> {tenor}M FLY CURVE</div>
                    <div className="card-actions">
                        <button className={`info-btn ${showCurveInfo ? 'active' : ''}`} onClick={() => setShowCurveInfo(!showCurveInfo)} title="Chart Explanation">ⓘ</button>
                        <label className="toggle-switch">
                            <input type="checkbox" checked={showHistoryCurves} onChange={e => setShowHistoryCurves(e.target.checked)} />
                            <span className="toggle-track" />
                            History
                        </label>
                        <label className="toggle-switch">
                            <input type="checkbox" checked={showAll} onChange={e => setShowAll(e.target.checked)} />
                            <span className="toggle-track" />
                            Show All
                        </label>
                        <button
                            className="btn-export"
                            style={{
                                padding: '8px 12px',
                                background: isCurrentPinned ? 'rgba(var(--accent-rgb), 0.18)' : undefined,
                                borderColor: isCurrentPinned ? 'var(--accent)' : undefined,
                                color: isCurrentPinned ? 'var(--text-accent)' : undefined
                            }}
                            onClick={handlePinCurrentCurve}
                        >
                            {isCurrentPinned ? 'Pinned' : 'Pin This Graph'}
                        </button>
                        {activePinned.length > 0 && (
                            <button className="btn-export" style={{ padding: '8px 12px' }} onClick={() => setPinnedCurves(prev => prev.filter(p => !(p.tenor === tenor && p.showAll === showAll)))}>Clear Pins</button>
                        )}
                    </div>
                </div>
                <InfoPanel visible={showCurveInfo} text={`
                    <strong>Fly (Butterfly) Curve</strong> measures the curvature / convexity of the term structure.<br/>
                    • <strong>Formula</strong>: Front Spread − Back Spread (symmetrical butterfly).<br/>
                    • <strong>Above zero</strong>: Normal curvature — the front end is steeper than the back end.<br/>
                    • <strong>Below zero (red dashed line)</strong>: Inverted curvature — potential regime shift signal.<br/>
                    • <strong>Historical comparison lines</strong> help identify if curvature is trending or mean-reverting.
                `} />
                <div className="chart-stack">
                    <ChartSurface eyebrow="Current Structure" title="Curvature Snapshot" note={`${flies.data.length} fly nodes`}>
                        {activePinned.length > 0 && (
                            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, marginBottom: 8 }}>
                                {activePinned.map((pin, idx) => (
                                    <span
                                        key={`${pin.tenor}-${pin.showAll}-${pin.date}`}
                                        style={{ display: 'inline-flex', alignItems: 'center', gap: 6, fontSize: 11, color: 'var(--text-secondary)', border: `1px solid ${c.border}`, borderRadius: 999, padding: '4px 10px', background: 'rgba(0,0,0,0.22)' }}
                                    >
                                        <span style={{ width: 8, height: 8, borderRadius: '50%', background: getPinnedColor(idx), display: 'inline-block' }} />
                                        {`Pinned ${idx + 1}: ${pin.date}`}
                                    </span>
                                ))}
                            </div>
                        )}
                        <EChart option={flyCurveOption} style={{ height: 348 }} />
                    </ChartSurface>
                </div>
            </div>

            {showHistorySection && (<div className="terminal-card fade-in fade-in-3">
                <div className="card-header">
                    <div className="card-title"><span className="accent">|</span> HISTORICAL {tenor}M FLY TREND</div>
                    <div className="card-actions">
                        <button className={`info-btn ${showHistInfo ? 'active' : ''}`} onClick={() => setShowHistInfo(!showHistInfo)} title="Chart Explanation">ⓘ</button>
                    </div>
                </div>
                <InfoPanel visible={showHistInfo} text={`
                    <strong>Historical Fly Trend</strong> shows how the generic butterfly value has evolved over the lookback period.<br/>
                    • The <strong>filled area</strong> represents the fly value over time — sustained moves above/below zero indicate regime changes.<br/>
                    • <strong>MA-20</strong> (blue dotted): 20-day moving average — short-term curvature trend.<br/>
                    • <strong>MA-60</strong> (amber dotted): 60-day moving average — medium-term regime.<br/>
                    • <strong>Bollinger Bands</strong> (shaded): ±2σ around MA-20 — extreme curvature levels.<br/>
                    • <strong>Policy Rate overlay</strong> provides context: rate hikes often compress front-end spreads, affecting curvature.<br/>
                    • Use <strong>Bucket</strong> to select which point on the fly curve to track over time.
                `} />
                <div className="controls-row">
                    <div className="control-group">
                        <label>Filter</label>
                        <select value={histMode} onChange={e => setHistMode(e.target.value)}>
                            <option value="F">F-Only (Jan)</option>
                            <option value="all">All Months</option>
                        </select>
                    </div>
                    <div className="control-group">
                        <label>Bucket</label>
                        <input
                            type="number"
                            min="1"
                            max="50"
                            value={histRank}
                            onChange={e => setHistRank(Math.max(1, Number(e.target.value)))}
                            style={{
                                width: 60,
                                background: 'var(--bg-card)',
                                border: '1px solid var(--grid)',
                                color: 'var(--text-primary)',
                                borderRadius: 4,
                                padding: '4px 8px',
                                fontSize: 13,
                                fontFamily: 'Inter'
                            }}
                        />
                    </div>
                    {/* No client-side inversion toggle for flies; server returns front-back */}
                    
                </div>
                <ChartSurface eyebrow="Rolling History" title="Historical Curvature" note={`Bucket ${histRank} • ${histMode === 'F' ? 'F-Only' : 'All Months'}`}>
                    <EChart option={flyHistoryOption} style={{ height: 394 }} />
                </ChartSurface>
            </div>)}
        </div>
    );
}

                <h3>Lower Chart — Generic Rolling History</h3>

                <div className="guide-legend">

                    <li>Market stress or positioning extremes</li>
                    <li>Relative value opportunities when mean-reversion is expected</li>

// ─── Curve Monitor Tab ─────────────────────────────────────────
function CurveMonitorTab() {
    const POLL_INTERVAL_MS = 5000;
    const TENOR_ORDER = ['3M', '6M', '12M', '24M'];
    const c = useChartTheme();

    const [snapshot, setSnapshot] = useState(null);
    const [connected, setConnected] = useState(false);
    const [loading, setLoading] = useState(true);
    const [errorMessage, setErrorMessage] = useState('');
    const [lastSuccessfulFetchAt, setLastSuccessfulFetchAt] = useState(null);
    const [selectedRows, setSelectedRows] = useState({});
    const [activeTenor, setActiveTenor] = useState('12M');
    const [fullscreenChart, setFullscreenChart] = useState(null);

    const normalizeRows = (groupData, section) => {
        if (!groupData) return [];
        const direct = groupData[section];
        if (Array.isArray(direct)) return direct;
        const directLower = groupData[section.toLowerCase()];
        if (Array.isArray(directLower)) return directLower;
        return [];
    };

    const loadSnapshot = useCallback(async () => {
        try {
            const data = await api.marketSnapshot();
            setSnapshot(data);
            const isConnected = Boolean(data?.connected);
            setConnected(isConnected);
            setErrorMessage(data?.error_message || '');
            if (isConnected) setLastSuccessfulFetchAt(new Date());
        } catch (err) {
            setConnected(false);
            setErrorMessage(err?.message || 'Unable to fetch live market snapshot.');
        } finally {
            setLoading(false);
        }
    }, []);

    useEffect(() => {
        loadSnapshot();
        const timer = setInterval(loadSnapshot, POLL_INTERVAL_MS);
        return () => clearInterval(timer);
    }, [loadSnapshot]);

    const asOfLabel = snapshot?.as_of ? new Date(snapshot.as_of).toLocaleTimeString() : '--';
    const heartbeatLabel = lastSuccessfulFetchAt ? lastSuccessfulFetchAt.toLocaleTimeString() : '--';
    const latencyLabel = typeof snapshot?.latency_ms === 'number' ? `${Math.round(snapshot.latency_ms)} ms` : '--';

    const fmt = (value) => typeof value === 'number' ? value.toFixed(2) : '--';
    const netClass = (value) => typeof value === 'number' ? (value >= 0 ? 'positive' : 'negative') : '';
    const resolveEffectiveLivePrice = (row) => (
        typeof row?.live_price === 'number'
            ? row.live_price
            : (typeof row?.last_settled === 'number' ? row.last_settled : null)
    );
    const resolveChangeVsPrev = (row) => {
        if (typeof row?.net_change === 'number') return row.net_change;
        const effectiveLive = resolveEffectiveLivePrice(row);
        if (typeof effectiveLive === 'number' && typeof row?.last_settled === 'number') {
            return effectiveLive - row.last_settled;
        }
        return null;
    };
    const getDailySummary = (rows) => {
        const numeric = rows
            .map((row) => resolveChangeVsPrev(row))
            .filter((value) => typeof value === 'number');
        if (!numeric.length) {
            return {
                count: 0,
                avg: null,
                max: null,
                min: null,
            };
        }
        const values = numeric;
        return {
            count: values.length,
            avg: values.reduce((acc, v) => acc + v, 0) / values.length,
            max: Math.max(...values),
            min: Math.min(...values),
        };
    };
    const getLiveSummary = (rows) => {
        const values = rows
            .map((row) => resolveEffectiveLivePrice(row))
            .filter((value) => typeof value === 'number');
        const upCount = rows.filter((row) => {
            const chg = resolveChangeVsPrev(row);
            return typeof chg === 'number' && chg >= 0;
        }).length;
        const downCount = rows.filter((row) => {
            const chg = resolveChangeVsPrev(row);
            return typeof chg === 'number' && chg < 0;
        }).length;
        const tickCount = rows.filter((row) => Boolean(row?.tick_event)).length;
        if (!values.length) {
            return {
                avg: null,
                min: null,
                max: null,
                upCount,
                downCount,
                tickCount,
            };
        }
        return {
            avg: values.reduce((acc, v) => acc + v, 0) / values.length,
            min: Math.min(...values),
            max: Math.max(...values),
            upCount,
            downCount,
            tickCount,
        };
    };
    const buildNetChangeChart = (rows, title, key) => {
        const monitorPalette = {
            line: '#79acd8',
            marker: '#8ebce4',
            markerOutline: '#173b67',
            text: '#9fc0df',
            grid: 'rgba(170, 205, 235, 0.12)',
            gridStrong: 'rgba(170, 205, 235, 0.2)',
            upBar: '#63c2b6',
            downBar: '#cb7887',
        };
        const normalizedRows = rows
            .map((row) => {
                const effectiveLivePrice = resolveEffectiveLivePrice(row);
                const changeVsPrev = resolveChangeVsPrev(row);
                return {
                    ...row,
                    effective_live_price: effectiveLivePrice,
                    change_vs_prev: changeVsPrev,
                };
            })
            .filter((row) => typeof row?.effective_live_price === 'number' || typeof row?.change_vs_prev === 'number');
        const x = normalizedRows.map((row) => row?.name || '--');
        const chg = normalizedRows.map((row) => (typeof row?.change_vs_prev === 'number' ? row.change_vs_prev : null));
        const live = normalizedRows.map((row) => (typeof row?.effective_live_price === 'number' ? row.effective_live_price : null));
        const barColors = chg.map((value) => (typeof value === 'number' && value >= 0 ? monitorPalette.upBar : monitorPalette.downBar));
        const summary = getDailySummary(rows);
        const liveSummary = getLiveSummary(rows);

        if (normalizedRows.length === 0) {
            return {
                key,
                title,
                rows,
                summary,
                liveSummary,
                livePlot: {
                    data: [],
                    layout: {
                        margin: { l: 44, r: 12, t: 20, b: 36 },
                        xaxis: { visible: false },
                        yaxis: { visible: false },
                        showlegend: false,
                        annotations: [{
                            text: 'No live rows available',
                            xref: 'paper',
                            yref: 'paper',
                            x: 0.5,
                            y: 0.5,
                            showarrow: false,
                            font: { size: 12, color: c.text },
                        }],
                    },
                },
                changePlot: {
                    data: [],
                    layout: {
                        margin: { l: 44, r: 12, t: 20, b: 36 },
                        xaxis: { visible: false },
                        yaxis: { visible: false },
                        showlegend: false,
                        annotations: [{
                            text: 'No change rows available',
                            xref: 'paper',
                            yref: 'paper',
                            x: 0.5,
                            y: 0.5,
                            showarrow: false,
                            font: { size: 12, color: c.text },
                        }],
                    },
                },
            };
        }

        const maxAbs = Math.max(...chg.filter((value) => typeof value === 'number').map((value) => Math.abs(value)), 0);
        const yPadding = Math.max(0.25, maxAbs * 0.2);
        const liveValues = live.filter((value) => typeof value === 'number');
        const liveMin = Math.min(...liveValues);
        const liveMax = Math.max(...liveValues);
        const livePad = Math.max(0.2, (liveMax - liveMin) * 0.15);
        const minLiveIndex = live.findIndex((value) => value === liveMin);
        const maxLiveIndex = live.findIndex((value) => value === liveMax);
        const packedRowData = normalizedRows.map((row) => [
            row?.name,
            row?.effective_live_price,
            row?.last_settled,
            row?.change_vs_prev,
            row?.tick_event,
            row?.tick_direction,
            row?.tick_delta,
            typeof row?.live_price === 'number',
        ]);

        return {
            key,
            title,
            rows,
            summary,
            liveSummary,
            livePlot: {
                data: [{
                    type: 'scatter',
                    mode: 'lines+markers',
                    x,
                    y: live,
                    line: { color: monitorPalette.line, width: 2.8, shape: 'spline', smoothing: 0.72 },
                    marker: {
                        size: live.map((_, idx) => (idx === minLiveIndex || idx === maxLiveIndex ? 9 : 5)),
                        color: monitorPalette.marker,
                        line: { color: monitorPalette.markerOutline, width: 1.6 },
                    },
                    customdata: packedRowData,
                    hovertemplate: '<b>%{x}</b><br>Live Price: <b>%{y:.2f}</b><extra></extra>',
                }],
                layout: {
                    margin: { l: 42, r: 16, t: 8, b: 36 },
                    showlegend: false,
                    xaxis: {
                        tickangle: -24,
                        automargin: true,
                        showgrid: true,
                        gridcolor: monitorPalette.grid,
                        griddash: 'dot',
                        gridwidth: 1,
                        tickfont: { size: 9, color: monitorPalette.text },
                    },
                    yaxis: {
                        range: [liveMin - livePad, liveMax + livePad],
                        showgrid: true,
                        gridcolor: monitorPalette.grid,
                        griddash: 'dot',
                        zeroline: false,
                        tickfont: { color: monitorPalette.text, size: 9 },
                    },
                    annotations: [
                        {
                            x: x[minLiveIndex],
                            y: live[minLiveIndex],
                            text: `${live[minLiveIndex] >= 0 ? '+' : ''}${fmt(live[minLiveIndex])} bp`,
                            showarrow: true,
                            ax: 0,
                            ay: 24,
                            arrowwidth: 1,
                            arrowcolor: monitorPalette.text,
                            font: { size: 10, color: monitorPalette.text },
                        },
                        {
                            x: x[maxLiveIndex],
                            y: live[maxLiveIndex],
                            text: `${live[maxLiveIndex] >= 0 ? '+' : ''}${fmt(live[maxLiveIndex])} bp`,
                            showarrow: true,
                            ax: 0,
                            ay: -24,
                            arrowwidth: 1,
                            arrowcolor: monitorPalette.text,
                            font: { size: 10, color: monitorPalette.text },
                        },
                    ],
                },
            },
            changePlot: {
                data: [{
                    type: 'bar',
                    x,
                    y: chg,
                    marker: { color: barColors, line: { color: 'rgba(15, 23, 42, 0.35)', width: 0.5 } },
                    customdata: packedRowData,
                    hovertemplate: '<b>%{x}</b><br>Daily Change: <b>%{y:.2f}</b> bps<extra></extra>',
                }],
                layout: {
                    margin: { l: 42, r: 16, t: 8, b: 36 },
                    showlegend: false,
                    xaxis: {
                        tickangle: -24,
                        automargin: true,
                        showgrid: true,
                        gridcolor: monitorPalette.grid,
                        griddash: 'dot',
                        tickfont: { size: 9, color: monitorPalette.text },
                    },
                    yaxis: {
                        range: [-(maxAbs + yPadding), maxAbs + yPadding],
                        zeroline: true,
                        zerolinecolor: monitorPalette.gridStrong,
                        zerolinewidth: 1.5,
                        showgrid: true,
                        gridcolor: monitorPalette.grid,
                        griddash: 'dot',
                        tickfont: { color: monitorPalette.text, size: 9 },
                    },
                },
            },
        };
    };
    const monitorCharts = useMemo(() => {
        const groupData = snapshot?.groups?.[activeTenor] || snapshot?.groups?.[activeTenor.toLowerCase()] || null;
        const spreads = normalizeRows(groupData, 'Spreads');
        const flies = normalizeRows(groupData, 'Flies');
        return [
            buildNetChangeChart(spreads, `${activeTenor} Spread Curve`, `${activeTenor}-spreads`),
            buildNetChangeChart(flies, `${activeTenor} Fly Curve`, `${activeTenor}-flies`),
        ];
    }, [snapshot, c, activeTenor]);

    const handleChartClick = useCallback((chartKey, point) => {
        const raw = point?.customdata;
        if (!raw || !Array.isArray(raw)) return;
        const nextRow = {
            name: raw[0],
            live_price: raw[1],
            last_settled: raw[2],
            net_change: raw[3],
            tick_event: Boolean(raw[4]),
            tick_direction: raw[5] || null,
            tick_delta: raw[6],
            has_live_price: Boolean(raw[7]),
        };
        setSelectedRows((prev) => ({ ...prev, [chartKey]: nextRow }));
    }, []);
    const openFullscreen = useCallback((chart) => {
        setFullscreenChart(chart);
    }, []);
    const closeFullscreen = useCallback(() => {
        setFullscreenChart(null);
    }, []);

    return (
        <div className="curve-monitor-wrap">
            <div className="curve-monitor-status fade-in">
                <div className="curve-monitor-status-left">
                    <span className={`heartbeat-dot ${connected ? 'connected' : 'disconnected'}`} />
                    <div className="heartbeat-copy">
                        <div className="heartbeat-title">{connected ? 'Live feed healthy' : 'Connection lost'}</div>
                        <div className="heartbeat-meta">Last success: {heartbeatLabel}</div>
                    </div>
                </div>
                <div className="curve-monitor-status-right">
                    <div>As of: <strong>{asOfLabel}</strong></div>
                    <div>Latency: <strong>{latencyLabel}</strong></div>
                </div>
            </div>

            {!connected && !loading && (
                <div className="curve-monitor-banner fade-in">
                    Connection Lost. {errorMessage || 'Waiting for backend market snapshot service.'}
                </div>
            )}

            {loading && (
                <div className="loading-overlay"><div className="spinner" /> Connecting to market snapshot feed...</div>
            )}

            {!loading && (
                <>
                    <div className="curve-monitor-tenor-tabs">
                        {TENOR_ORDER.map((tenor) => (
                            <button
                                key={tenor}
                                className={`curve-monitor-tenor-tab ${activeTenor === tenor ? 'active' : ''}`}
                                onClick={() => setActiveTenor(tenor)}
                            >
                                {tenor}
                            </button>
                        ))}
                    </div>
                    <div className="curve-monitor-charts-grid">
                        {monitorCharts.map((chart, idx) => (
                            <div className={`curve-monitor-chart-card fade-in fade-in-${(idx % 4) + 1}`} key={chart.key}>
                                <div className="curve-monitor-chart-header">
                                    <div className="curve-monitor-chart-title">{chart.title}</div>
                                    <button className="curve-monitor-expand-btn" onClick={() => openFullscreen(chart)} title="Open fullscreen chart">
                                        ↗
                                    </button>
                                </div>
                                <div className="curve-monitor-mini-heading">Live Price</div>
                                <div className="curve-monitor-chart-click-target" onClick={() => openFullscreen(chart)}>
                                    <PlotlyChart
                                        data={chart.livePlot.data}
                                        layout={chart.livePlot.layout}
                                        style={{ height: 200 }}
                                        onPointClick={(point) => handleChartClick(chart.key, point)}
                                    />
                                </div>
                                <div className="curve-monitor-mini-heading">Chg vs Prev Close</div>
                                <div className="curve-monitor-chart-click-target" onClick={() => openFullscreen(chart)}>
                                    <PlotlyChart
                                        data={chart.changePlot.data}
                                        layout={chart.changePlot.layout}
                                        style={{ height: 118 }}
                                        onPointClick={(point) => handleChartClick(chart.key, point)}

function DVO1MergedHistory({ tenor, params }) {
    const [kind, setKind] = useState('spread');
    const [histMode, setHistMode] = useState('F');
    const [histRank, setHistRank] = useState(1);
    const [series, setSeries] = useState(null);
    const [loading, setLoading] = useState(true);
    const c = useChartTheme();

    useEffect(() => {
        setLoading(true);
        const fn = kind === 'spread' ? api.spreadsHistory : api.fliesHistory;
        fn(tenor, params.date, params.lookback, histRank, histMode)
            .then(setSeries)
            .catch(console.error)
            .finally(() => setLoading(false));
    }, [kind, tenor, params.date, params.lookback, histRank, histMode]);

    const traces = [];
    if (series?.data?.length) {
        const dates = series.data.map(d => d.date);
        const vals = series.data.map(d => d.value);
        traces.push({
            name: kind === 'spread' ? 'Spread' : 'Fly',
            data: dates.map((x, i) => [x, vals[i]]),
            lineStyle: { color: c.primary, width: 2.2 },
            itemStyle: { color: c.primary },
            areaStyle: { color: c.primaryFill },
            showSymbol: false,
        });
        const b = series.bands || {};
        if (b.ma_20) traces.push({ name: 'MA-20', data: dates.map((x, i) => [x, b.ma_20[i]]), lineStyle: { color: c.ma1, width: 1.5, type: 'dashed' }, itemStyle: { color: c.ma1 }, showSymbol: false });
        if (b.ma_60) traces.push({ name: 'MA-60', data: dates.map((x, i) => [x, b.ma_60[i]]), lineStyle: { color: c.ma2, width: 1.5, type: 'dashed' }, itemStyle: { color: c.ma2 }, showSymbol: false });
        if (b.upper_20) traces.push({ name: '+2σ', data: dates.map((x, i) => [x, b.upper_20[i]]), lineStyle: { color: c.ma1, width: 0.8 }, itemStyle: { color: c.ma1 }, showSymbol: false });
        if (b.lower_20) traces.push({ name: '-2σ', data: dates.map((x, i) => [x, b.lower_20[i]]), lineStyle: { color: c.ma1, width: 0.8 }, itemStyle: { color: c.ma1 }, showSymbol: false });
    }
    if (series?.index?.length) {
        traces.push({
            name: 'Policy Rate',
            data: series.index.map(d => [d.date, d.value]),
            lineStyle: { color: c.overlay, width: 1.3, type: 'dashed' },
            itemStyle: { color: c.overlay },
            yAxisIndex: 1,
            showSymbol: false,
        });
    }
    const option = buildTimeSeriesOption({
        c,
        yAxisName: `${kind === 'spread' ? 'Spread' : 'Fly'} (bps)`,
        overlayName: 'Policy Rate',
        series: traces,
    });

    return (
        <div className="terminal-card fade-in fade-in-3" style={{ marginTop: 16 }}>
            <div className="card-header">
                <div className="card-title"><span className="accent">|</span> HISTORICAL {tenor}M TREND</div>
                <div className="card-actions">
                    <div style={{ display: 'flex', background: 'rgba(0,0,0,0.5)', borderRadius: 4, overflow: 'hidden', border: `1px solid ${c.border}`, marginRight: 10 }}>
                        <button className={`sub-tab-btn ${kind === 'spread' ? 'active' : ''}`} onClick={() => setKind('spread')} style={{padding: '4px 10px', fontSize: 10, border: 'none', background: 'none'}}>Spreads</button>
                        <button className={`sub-tab-btn ${kind === 'fly' ? 'active' : ''}`} onClick={() => setKind('fly')} style={{padding: '4px 10px', fontSize: 10, border: 'none', background: 'none'}}>Flies</button>
                    </div>
                    <div className="control-group" style={{ marginRight: 10 }}>
                        <select value={histMode} onChange={e => setHistMode(e.target.value)}>
                            <option value="F">F-Only</option>
                            <option value="all">All</option>
                        </select>
                    </div>
                    <div className="control-group">
                        <input type="number" min="1" max="50" value={histRank} onChange={e => setHistRank(Math.max(1, Number(e.target.value) || 1))} style={{width: 56}} />
                    </div>
                </div>
            </div>
            {loading ? (
                <div style={{height: 300, display: 'flex', alignItems: 'center', justifyContent: 'center'}}><div className="spinner" /></div>
            ) : (
                <ChartSurface eyebrow="Rolling History" title={`${kind === 'spread' ? 'Spread' : 'Fly'} History`} note={`Bucket ${histRank} • ${histMode === 'F' ? 'F-Only' : 'All Months'}`}>
                    <EChart option={option} style={{ height: 394 }} />
                </ChartSurface>
            )}
        </div>
    );
}

function DVO1UnifiedCurves({ tenor, params }) {
    const c = useChartTheme();
    const [loading, setLoading] = useState(true);
    const [showHistoryCurves, setShowHistoryCurves] = useState(false);
    const [showAll, setShowAll] = useState(false);
    const [contractWindow, setContractWindow] = useState(12);
    const [spreadRes, setSpreadRes] = useState(null);
    const [flyRes, setFlyRes] = useState(null);
    const [spreadPast, setSpreadPast] = useState(null);
    const [flyPast, setFlyPast] = useState(null);
    const [pinnedSpreads, setPinnedSpreads] = useState([]);
    const [pinnedFlies, setPinnedFlies] = useState([]);

    useEffect(() => {
        setLoading(true);
        Promise.all([
            api.spreads(tenor, params.date, showAll),
            api.spreadsPast(tenor, params.date, params.n1, params.n2, params.n3, showAll),
            api.flies(tenor, params.date, showAll),
            api.fliesPast(tenor, params.date, params.n1, params.n2, params.n3, showAll),
        ])
            .then(([s, sp, f, fp]) => {
                setSpreadRes(s);
                setSpreadPast(sp);
                setFlyRes(f);
                setFlyPast(fp);
            })
            .catch(console.error)
            .finally(() => setLoading(false));
    }, [tenor, params.date, params.n1, params.n2, params.n3, showAll]);

    if ((loading && (!spreadRes?.data?.length || !flyRes?.data?.length)) || !spreadRes?.data?.length || !flyRes?.data?.length) {
        return <div className="terminal-card fade-in fade-in-2"><div style={{height: 300, display: 'flex', alignItems: 'center', justifyContent: 'center'}}><div className="spinner" /></div></div>;
    }

    const spreadRows = spreadRes.data;
    const flyRows = flyRes.data;
    const spreadCount = spreadRows.length;
    const flyCount = flyRows.length;
    const visibleSpread = spreadCount > 0 ? Math.max(1, Math.min(contractWindow, spreadCount)) : 0;
    const visibleFly = flyCount > 0 ? Math.max(1, Math.min(contractWindow, flyCount)) : 0;
    const spreadSlice = spreadRows.slice(0, visibleSpread);
    const flySlice = flyRows.slice(0, visibleFly);

    const spreadTraces = [];
    const flyTraces = [];
    const getPinnedColor = (index) => {
        const hue = (index * 47 + 22) % 360;
        return `hsla(${hue}, 72%, 72%, 0.72)`;
    };
    if (showHistoryCurves) {
        (spreadPast ? Object.entries(spreadPast) : []).forEach(([key, val], i) => {
            if (!val.data?.length) return;
            spreadTraces.push({
                x: val.data.slice(0, visibleSpread).map(d => formatShortName(d.pair, true)),
                y: val.data.slice(0, visibleSpread).map(d => d.value),
                name: `${key.toUpperCase()} (${val.date})`,
                line: { color: c.past[i % 3], width: 1.4, shape: 'linear' },
                mode: 'lines',
                smooth: false,
            });
        });
        (flyPast ? Object.entries(flyPast) : []).forEach(([key, val], i) => {
            if (!val.data?.length) return;
            flyTraces.push({
                x: val.data.slice(0, visibleFly).map(d => formatShortName(d.name, false)),
                y: val.data.slice(0, visibleFly).map(d => d.value),
                name: `${key.toUpperCase()} (${val.date})`,
                line: { color: c.past[i % 3], width: 1.4, shape: 'linear' },
                mode: 'lines',
                smooth: false,
            });
        });
    }
    const activePinnedSpreads = pinnedSpreads
        .filter(p => p.tenor === tenor && p.showAll === showAll)
        .filter(p => p.date !== spreadRes?.date);
    activePinnedSpreads.forEach((pinned, i) => {
        const rows = pinned.data || [];
        if (!rows.length) return;
        spreadTraces.push({
            x: spreadSlice.map(d => formatShortName(d.pair, true)),
            y: spreadSlice.map((_, idx) => (idx < rows.length ? rows[idx].value : null)),
            name: `Pinned ${i + 1} (${pinned.date})`,
            mode: 'lines',
            smooth: false,
            line: { color: getPinnedColor(i), width: 1.6, shape: 'linear', dash: 'dashed' },
            showSymbol: true,
            symbol: 'circle',
            symbolSize: 3,
            connectNulls: false,
        });
    });
    const activePinnedFlies = pinnedFlies
        .filter(p => p.tenor === tenor && p.showAll === showAll)
        .filter(p => p.date !== flyRes?.date);
    activePinnedFlies.forEach((pinned, i) => {
        const rows = pinned.data || [];
        if (!rows.length) return;
        flyTraces.push({
            x: flySlice.map(d => formatShortName(d.name, false)),
            y: flySlice.map((_, idx) => (idx < rows.length ? rows[idx].value : null)),
            name: `Pinned ${i + 1} (${pinned.date})`,
            mode: 'lines',
            smooth: false,
            line: { color: getPinnedColor(i), width: 1.6, shape: 'linear', dash: 'dashed' },
            showSymbol: true,
            symbol: 'circle',
            symbolSize: 3,
            connectNulls: false,
        });
    });
    spreadTraces.push({
        x: spreadSlice.map(d => formatShortName(d.pair, true)),
        y: spreadSlice.map(d => d.value),
        name: `Selected (${spreadRes.date})`,
        mode: 'lines+markers',
        smooth: false,
        line: { color: c.primary, width: 3, shape: 'linear' },
        marker: { size: 6, color: c.primary, line: { width: 1.5, color: c.panel } },
    });
    flyTraces.push({
        x: flySlice.map(d => formatShortName(d.name, false)),
        y: flySlice.map(d => d.value),
        name: `Selected (${flyRes.date})`,
        mode: 'lines+markers',
        smooth: false,
        line: { color: c.primary, width: 3, shape: 'linear' },
        marker: { size: 6, color: c.primary, line: { width: 1.5, color: c.panel } },
    });

    const spreadOption = buildCategoryLineOption({
        categories: spreadSlice.map(d => formatShortName(d.pair, true)),
        traces: spreadTraces,
        c,
        yAxisName: 'Spread (bps)',
        zeroLine: true,
    });
    const flyOption = buildCategoryLineOption({
        categories: flySlice.map(d => formatShortName(d.name, false)),
        traces: flyTraces,
        c,
        yAxisName: 'Fly (bps)',
        zeroLine: true,
    });
    const isCurrentSpreadPinned = pinnedSpreads.some(p => p.date === (spreadRes?.date || params.date) && p.tenor === tenor && p.showAll === showAll);
    const isCurrentFlyPinned = pinnedFlies.some(p => p.date === (flyRes?.date || params.date) && p.tenor === tenor && p.showAll === showAll);
    const handlePinSpread = () => {
        const targetDate = spreadRes?.date || params.date;
        if (!targetDate || isCurrentSpreadPinned) return;
        api.spreads(tenor, targetDate, showAll).then((res) => {
            if (!res?.data?.length) return;
            setPinnedSpreads(prev => [...prev, { date: res.date || targetDate, tenor, showAll, data: res.data }]);
        }).catch(console.error);
    };
    const handlePinFly = () => {
        const targetDate = flyRes?.date || params.date;
        if (!targetDate || isCurrentFlyPinned) return;
        api.flies(tenor, targetDate, showAll).then((res) => {
            if (!res?.data?.length) return;
            setPinnedFlies(prev => [...prev, { date: res.date || targetDate, tenor, showAll, data: res.data }]);
        }).catch(console.error);
    };

    return (
        <div className="terminal-card fade-in fade-in-2">
            <div className="card-header">
                <div className="card-title"><span className="accent">|</span> {tenor}M DVO1 CURVES</div>
                <div className="card-actions">
                    <label className="toggle-switch" style={{marginRight: 16}}>
                        <input type="checkbox" checked={showHistoryCurves} onChange={e => setShowHistoryCurves(e.target.checked)} />
                        <span className="toggle-track" />
                        History
                    </label>
                    <label className="toggle-switch" style={{marginRight: 16}}>
                        <input type="checkbox" checked={showAll} onChange={e => setShowAll(e.target.checked)} />
                        <span className="toggle-track" />
                        Show All
                    </label>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8, minWidth: 190, marginRight: 10 }}>
                        <span style={{ fontSize: 11, color: 'var(--text-muted)', whiteSpace: 'nowrap' }}>Contracts</span>
                        <input type="range" min="1" max={Math.max(spreadCount, flyCount)} step="1" value={Math.max(1, Math.min(contractWindow, Math.max(spreadCount, flyCount)))} onChange={e => setContractWindow(Number(e.target.value))} style={{ width: 120 }} />
                        <span style={{ fontSize: 11, color: 'var(--text-secondary)', minWidth: 42, textAlign: 'right' }}>{Math.min(visibleSpread, visibleFly)}/{Math.max(spreadCount, flyCount)}</span>
                    </div>
                    <span style={{ fontSize: 11, color: 'var(--text-muted)', marginRight: 10 }}>As of: {spreadRes?.date || params.date}</span>
                </div>
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(420px, 1fr))', gap: 12 }}>
                <ChartSurface
                    eyebrow="DVO1 Spread Strip"
                    title="Spread Curve"
                    note={`${visibleSpread}/${spreadCount} visible nodes`}
                    actions={
                        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                            <button className="btn-export" style={{ padding: '6px 10px', background: isCurrentSpreadPinned ? 'rgba(var(--accent-rgb), 0.18)' : undefined, borderColor: isCurrentSpreadPinned ? 'var(--accent)' : undefined, color: isCurrentSpreadPinned ? 'var(--text-accent)' : undefined }} onClick={handlePinSpread}>
                                {isCurrentSpreadPinned ? 'Spread Pinned' : 'Pin Spread Graph'}
                            </button>
                            {activePinnedSpreads.length > 0 && <button className="btn-export" style={{ padding: '6px 10px' }} onClick={() => setPinnedSpreads(prev => prev.filter(p => !(p.tenor === tenor && p.showAll === showAll)))}>Clear Spread Pins</button>}
                        </div>
                    }
                >
                    <EChart option={spreadOption} style={{ height: 348 }} />
                </ChartSurface>
                <ChartSurface
                    eyebrow="DVO1 Fly Strip"
                    title="Fly Curve"
                    note={`${visibleFly}/${flyCount} visible nodes`}
                    actions={
                        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                            <button className="btn-export" style={{ padding: '6px 10px', background: isCurrentFlyPinned ? 'rgba(var(--accent-rgb), 0.18)' : undefined, borderColor: isCurrentFlyPinned ? 'var(--accent)' : undefined, color: isCurrentFlyPinned ? 'var(--text-accent)' : undefined }} onClick={handlePinFly}>
                                {isCurrentFlyPinned ? 'Fly Pinned' : 'Pin Fly Graph'}
                            </button>
                            {activePinnedFlies.length > 0 && <button className="btn-export" style={{ padding: '6px 10px' }} onClick={() => setPinnedFlies(prev => prev.filter(p => !(p.tenor === tenor && p.showAll === showAll)))}>Clear Fly Pins</button>}
                        </div>
                    }
                >
                    <EChart option={flyOption} style={{ height: 348 }} />
                </ChartSurface>
            </div>
        </div>
    );
}
