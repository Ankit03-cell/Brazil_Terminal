function FRATab({ params }) {
    const [fraData, setFraData] = useState(null);
    const [spreadCurve, setSpreadCurve] = useState(null);
    const [pastSpreadCurve, setPastSpreadCurve] = useState(null);
    const [flyCurve, setFlyCurve] = useState(null);
    const [pastFlyCurve, setPastFlyCurve] = useState(null);
    const [showHistoryCurves, setShowHistoryCurves] = useState(false);
    const [pinnedSpreadCurves, setPinnedSpreadCurves] = useState([]);
    const [pinnedFlyCurves, setPinnedFlyCurves] = useState([]);
    
    const [spreadHist, setSpreadHist] = useState(null);
    const [flyHist, setFlyHist] = useState(null);

    const [loadingCurve, setLoadingCurve] = useState(true);
    const [loadingHist, setLoadingHist] = useState(false);
    
    const [historyMode, setHistoryMode] = useState('spreads'); // 'spreads' or 'flies'
    const [activeTenor, setActiveTenor] = useState(12);
    const [contractWindow, setContractWindow] = useState(12);
    
    // Separate toggles for Curve vs History
    const [curveFOnlySpread, setCurveFOnlySpread] = useState(false);
    const [curveFOnlyFly, setCurveFOnlyFly] = useState(false);
    const [histFOnly, setHistFOnly] = useState(false);
    const [genericRank, setGenericRank] = useState(1); // 'All', 1, 2, 3...
    const c = useChartTheme();

    // 1. Fetch FRA spread curve for the upper graph
    useEffect(() => {
        setLoadingCurve(true);
        Promise.all([
            api.fra(params.date),
            api.fraSpreadsOnDate(activeTenor, curveFOnlySpread, params.date),
            api.fraSpreadsPast(activeTenor, curveFOnlySpread, params.date, params.n1, params.n2, params.n3),
            api.fraSpreadsOnDate(activeTenor, curveFOnlyFly, params.date),
            api.fraSpreadsPast(activeTenor, curveFOnlyFly, params.date, params.n1, params.n2, params.n3),
        ])
        .then(([fraRes, spreadRes, pastRes, flyRes, pastFlyRes]) => {
            setFraData(fraRes);
            setSpreadCurve(spreadRes);
            setPastSpreadCurve(pastRes);
            setFlyCurve(flyRes);
            setPastFlyCurve(pastFlyRes);
        })
        .catch(console.error)
        .finally(() => setLoadingCurve(false));
    }, [params.date, activeTenor, curveFOnlySpread, curveFOnlyFly, params.n1, params.n2, params.n3]);

    const handlePinCurrentSpreadCurve = useCallback(() => {
        const targetDate = spreadCurve?.date || params.date;
        if (!targetDate) return;
        if (pinnedSpreadCurves.some(p => p.date === targetDate && p.tenor === activeTenor && p.fOnly === curveFOnlySpread)) return;

        api.fraSpreadsOnDate(activeTenor, curveFOnlySpread, targetDate)
            .then((res) => {
                if (!res?.data?.length) return;
                setPinnedSpreadCurves(prev => ([
                    ...prev,
                    { date: res.date || targetDate, tenor: activeTenor, fOnly: curveFOnlySpread, data: res.data }
                ]));
            })
            .catch(console.error);
    }, [spreadCurve?.date, params.date, pinnedSpreadCurves, activeTenor, curveFOnlySpread]);

    // 2. Fetch Generic Histories
    useEffect(() => {
        setLoadingHist(true);
        if (historyMode === 'spreads') {
            api.fraSpreadsHistory(activeTenor, histFOnly, params.date, params.lookback)
               .then(setSpreadHist)
               .catch(console.error)
               .finally(() => setLoadingHist(false));
        } else {
            api.fraFliesHistory(activeTenor, histFOnly, params.date, params.lookback)
               .then(setFlyHist)
               .catch(console.error)
               .finally(() => setLoadingHist(false));
        }
    }, [historyMode, activeTenor, histFOnly, params.date, params.lookback]);

    if (loadingCurve && !spreadCurve) return <div className="loading-overlay"><div className="spinner" /> Loading FRA data...</div>;

    // Spread curve data for upper graph
    const spreads = spreadCurve?.data || [];
    const flySpreads = flyCurve?.data || [];

    // Short contract labels for spread curve
    const spotLabel = (c) => c.replace(' Comdty', '');
    const spreadLabel = (s) => `${spotLabel(s.leg1_front)}`;

    // Spread chart convention stays inverted.
    const displaySpreads = spreads.map(s => ({
        ...s,
        display_value: -s.spread_value * 100,
    }));
    const displayFlySpreads = flySpreads.map(s => ({
        ...s,
        display_value: -s.spread_value * 100,
        fly_base: s.spread_value * 100,
    }));

    // KPIs based on spread values
    const avgSpread = displaySpreads.length ? (displaySpreads.reduce((a, s) => a + s.display_value, 0) / displaySpreads.length) : 0;
    const maxSpread = displaySpreads.length ? Math.max(...displaySpreads.map(s => s.display_value)) : 0;
    const minSpread = displaySpreads.length ? Math.min(...displaySpreads.map(s => s.display_value)) : 0;
    const countNodes = displaySpreads.length;
    const visibleNodeCount = countNodes > 0 ? Math.max(1, Math.min(contractWindow, countNodes)) : 0;
    const chartSpreads = visibleNodeCount > 0 ? displaySpreads.slice(0, visibleNodeCount) : [];
    
    const validLabels = new Set(chartSpreads.map(s => spreadLabel(s)));

    const buildFlyFromDisplaySpreads = (rows, tenorMonths) => {
        // FRA fly for a tenor strip is built from consecutive spreads:
        // Fly_i = Spread_i - Spread_{i+1}
        const gap = 1;
        const out = [];
        for (let i = 0; i + gap < rows.length; i += 1) {
            const s1 = rows[i];
            const s2 = rows[i + gap];
            const frontCode = spotLabel(s1.leg1_front || '');
            out.push({
                label: `${frontCode}${gap}`,
                contract: frontCode,
                fly_value: -((s1.fly_base ?? s1.display_value ?? 0) - (s2.fly_base ?? s2.display_value ?? 0)),
            });
        }
        return out;
    };
    
    const spreadTraces = [];
    const flyTraces = [];
    
    // Add past curves if toggled
    if (showHistoryCurves && pastSpreadCurve) {
        Object.entries(pastSpreadCurve).forEach(([key, val], i) => {
            if (val.data?.length) {
                const mapped = val.data
                    .filter(s => validLabels.has(spreadLabel(s)))
                    .map(s => ({
                        label: spreadLabel(s),
                        value: -s.spread_value * 100
                    }));
                
                spreadTraces.push({
                    x: mapped.map(s => s.label),
                    y: mapped.map(s => s.value),
                    name: `${key.toUpperCase()} (${val.date})`,
                    mode: 'lines',
                    smooth: false,
                    line: { color: c.past[i % 3], width: 1.5, shape: 'linear' },
                    hovertemplate: `<b>%{x}</b><br>${key.toUpperCase()} (${val.date}): <b>%{y:.1f} bps</b><extra></extra>`,
                });
            }
        });
    }
    if (showHistoryCurves && pastFlyCurve) {
        Object.entries(pastFlyCurve).forEach(([key, val], i) => {
            if (!val.data?.length) return;
            const mappedDisplayRows = val.data.map((s) => ({
                ...s,
                display_value: -s.spread_value * 100,
                fly_base: s.spread_value * 100,
            }));
            const pastFlies = buildFlyFromDisplaySpreads(mappedDisplayRows, activeTenor);
            if (!pastFlies.length) return;
            flyTraces.push({
                x: pastFlies.map(f => f.label),
                y: pastFlies.map(f => f.fly_value),
                name: `${key.toUpperCase()} Fly (${val.date})`,
                mode: 'lines',
                smooth: false,
                line: { color: c.past[i % 3], width: 1.2, dash: 'dashed', shape: 'linear' },
                hovertemplate: `<b>%{x}</b><br>${key.toUpperCase()} Fly (${val.date}): <b>%{y:.1f} bps</b><extra></extra>`,
            });
        });
    }
    
    // Add pinned curves (only for active tenor/filter and same x-axis contract universe)
    const activePinnedSpreads = pinnedSpreadCurves
        .filter(p => p.tenor === activeTenor && p.fOnly === curveFOnlySpread)
        .filter(p => p.date !== spreadCurve?.date);
    const isCurrentSpreadPinned = pinnedSpreadCurves.some(
        p => p.date === (spreadCurve?.date || params.date) && p.tenor === activeTenor && p.fOnly === curveFOnlySpread
    );

    const getPinnedColor = (index) => {
        const hue = (index * 47 + 22) % 360;
        return `hsla(${hue}, 72%, 72%, 0.72)`;
    };

    activePinnedSpreads.forEach((pinned, i) => {
        const pinnedRows = pinned.data || [];
        if (!pinnedRows.length) return;
        const xSlots = chartSpreads.map(s => spreadLabel(s));
        const yAligned = xSlots.map((_, idx) => (
            idx < pinnedRows.length ? -pinnedRows[idx].spread_value * 100 : null
        ));
        const pinnedContracts = xSlots.map((_, idx) => (
            idx < pinnedRows.length ? spotLabel(pinnedRows[idx].leg1_front) : null
        ));

        spreadTraces.push({
            x: xSlots,
            y: yAligned,
            name: `Pinned ${i + 1} (${pinned.date})`,
            mode: 'lines',
            smooth: false,
            showSymbol: true,
            symbol: 'circle',
            symbolSize: 3,
            line: { color: getPinnedColor(i), width: 1.6, shape: 'linear', dash: 'dashed', opacity: 0.72 },
            connectNulls: false,
            customdata: pinnedContracts,
            hovertemplate: `<b>%{x}</b><br>Pinned ${i + 1} (${pinned.date}): <b>%{y:.1f} bps</b><br>Pinned Contract: %{customdata}<extra></extra>`,
        });

    });

    const spreadLineTrace = {
        x: chartSpreads.map(s => spreadLabel(s)),
        y: chartSpreads.map(s => s.display_value),
        name: `Selected (${spreadCurve?.date})`,
        mode: 'lines+markers',
        smooth: false,
        line: { color: c.primary, width: 3.25, shape: 'linear' },
        marker: { size: 7, color: c.primary, line: { width: 2, color: c.panel } },
        hovertemplate: `<b>%{x}</b><br>Selected (${spreadCurve?.date}): <b>%{y:.1f} bps</b><extra></extra>`,
    };
    spreadTraces.push(spreadLineTrace);

    const flyNodeCount = displayFlySpreads.length;
    const flyVisibleNodeCount = flyNodeCount > 0 ? Math.max(1, Math.min(contractWindow, flyNodeCount)) : 0;
    const chartFlySpreads = flyVisibleNodeCount > 0 ? displayFlySpreads.slice(0, flyVisibleNodeCount) : [];
    const currentFlies = buildFlyFromDisplaySpreads(chartFlySpreads, activeTenor);

    const activePinnedFlies = pinnedFlyCurves
        .filter(p => p.tenor === activeTenor && p.fOnly === curveFOnlyFly)
        .filter(p => p.date !== (flyCurve?.date || params.date));
    const isCurrentFlyPinned = pinnedFlyCurves.some(
        p => p.date === (flyCurve?.date || params.date) && p.tenor === activeTenor && p.fOnly === curveFOnlyFly
    );

    activePinnedFlies.forEach((pinned, i) => {
        const pinnedSpreadRows = pinned.data || [];
        if (!pinnedSpreadRows.length) return;
        const pinnedDisplaySpreads = pinnedSpreadRows.map(s => ({
            ...s,
            display_value: -s.spread_value * 100,
            fly_base: s.spread_value * 100,
        }));
        const flyRows = buildFlyFromDisplaySpreads(pinnedDisplaySpreads, activeTenor);
        if (!flyRows.length) return;
        const currentFlyLabels = currentFlies.map(f => f.label);
        const alignedPinnedY = currentFlyLabels.map((_, idx) => (
            idx < flyRows.length ? flyRows[idx].fly_value : null
        ));
        flyTraces.push({
            x: currentFlyLabels,
            y: alignedPinnedY,
            name: `Pinned ${i + 1} (${pinned.date})`,
            mode: 'lines',
            smooth: false,
            showSymbol: false,
            line: { color: getPinnedColor(i), width: 1.5, shape: 'linear', dash: [4, 4], opacity: 0.72 },
            connectNulls: false,
            hovertemplate: `<b>%{x}</b><br>Pinned ${i + 1} (${pinned.date}): <b>%{y:.1f} bps</b><extra></extra>`,
        });
    });

    if (currentFlies.length) {
        flyTraces.push({
            x: currentFlies.map(f => f.label),
            y: currentFlies.map(f => f.fly_value),
            name: `Selected (${flyCurve?.date || params.date})`,
            mode: 'lines+markers',
            smooth: false,
            line: { color: c.primary, width: 3.0, dash: 'solid', shape: 'linear' },
            marker: { size: 5, color: c.primary, line: { width: 1.2, color: c.panel } },
            hovertemplate: `<b>%{x}</b><br>Selected (${flyCurve?.date || params.date}): <b>%{y:.1f} bps</b><extra></extra>`,
        });
    }

    const handlePinCurrentFlyCurve = () => {
        const targetDate = flyCurve?.date || params.date;
        if (!targetDate) return;
        if (pinnedFlyCurves.some(p => p.date === targetDate && p.tenor === activeTenor && p.fOnly === curveFOnlyFly)) return;
        api.fraSpreadsOnDate(activeTenor, curveFOnlyFly, targetDate)
            .then((res) => {
                if (!res?.data?.length) return;
                setPinnedFlyCurves(prev => ([
                    ...prev,
                    { date: res.date || targetDate, tenor: activeTenor, fOnly: curveFOnlyFly, data: res.data }
                ]));
            })
            .catch(console.error);
    };

    const calcYRange = (allSeries) => {
        let allY = [];
        allSeries.forEach(t => allY = allY.concat((t.y || []).filter(v => v != null)));
        let minV = allY.length ? Math.min(...allY) : -1;
        let maxV = allY.length ? Math.max(...allY) : 1;
        if (minV === maxV) {
            const pad = Math.max(Math.abs(maxV) * 0.02, 0.01);
            minV -= pad;
            maxV += pad;
        } else {
            const pad = (maxV - minV) * 0.12;
            minV -= pad;
            maxV += pad;
        }
        return { minV, maxV };
    };
    const spreadRange = calcYRange(spreadTraces);
    const flyRange = calcYRange(flyTraces);
    const flyCategories = currentFlies.map(f => f.label);
    const alignedFlyTraces = flyTraces.map((t) => {
        const vMap = new Map((t.x || []).map((x, i) => [x, (t.y || [])[i]]));
        return {
            ...t,
            x: flyCategories,
            y: flyCategories.map((x) => (vMap.has(x) ? vMap.get(x) : null)),
        };
    });

    // Generate historical Plotly traces
    const buildHistoryTraces = (dataArr) => {
        if (!dataArr) return [];
        let renderData = dataArr;
        if (genericRank !== 'All') {
            renderData = dataArr.filter(x => x.name === `Generic ${genericRank}`);
        }
        const colors = ['#60a5fa', '#f87171', '#34d399'];
        return renderData.map((s, idx) => ({
            x: s.x,
            y: s.y,
            name: s.name,
            type: 'scatter',
            mode: 'lines',
            line: { color: colors[idx % colors.length], width: 2 - (idx * 0.3) },
            hovertemplate: `<b>%{x}</b><br>${s.name}: <b>%{y:.2f} bps</b><br>Active: %{customdata}<extra></extra>`,
            customdata: s.labels
        }));
    };

    const fraSpreadOption = buildCategoryLineOption({
        categories: chartSpreads.map(s => spreadLabel(s)),
        traces: spreadTraces,
        c,
        yAxisName: 'FRA Spread (bps)',
        zeroLine: true,
        min: spreadRange.minV,
        max: spreadRange.maxV,
    });
    fraSpreadOption.yAxis.axisLabel.formatter = (value) => `${value >= 0 ? '+' : ''}${Number(value).toFixed(1)}`;
    fraSpreadOption.tooltip.valueFormatter = (value) => value == null ? '--' : `${Number(value).toFixed(1)} bps`;
    if (fraSpreadOption.series?.length) {
        fraSpreadOption.series[0].markLine = {
            silent: true,
            symbol: 'none',
            lineStyle: { color: c.zeroLine, width: 1, type: 'dashed' },
            data: [{ yAxis: 0 }]
        };
    }

    const fraFlyOption = buildCategoryLineOption({
        categories: flyCategories,
        traces: alignedFlyTraces,
        c,
        yAxisName: 'FRA Fly (bps)',
        zeroLine: true,
        min: flyRange.minV,
        max: flyRange.maxV,
    });
    fraFlyOption.yAxis.axisLabel.formatter = (value) => `${value >= 0 ? '+' : ''}${Number(value).toFixed(1)}`;
    fraFlyOption.tooltip.valueFormatter = (value) => value == null ? '--' : `${Number(value).toFixed(1)} bps`;
    if (fraFlyOption.series?.length) {
        fraFlyOption.series[0].markLine = {
            silent: true,
            symbol: 'none',
            lineStyle: { color: c.zeroLine, width: 1, type: 'dashed' },
            data: [{ yAxis: 0 }]
        };
    }

    const fraHistoryOption = buildTimeSeriesOption({
        c,
        yAxisName: `${historyMode === 'spreads' ? 'Spread' : 'Fly'} (bps)`,
        series: buildHistoryTraces(historyMode === 'spreads' ? spreadHist : flyHist).map((trace) => ({
            name: trace.name,
            data: trace.x.map((x, i) => [x, trace.y[i]]),
            lineStyle: { color: trace.line.color, width: trace.line.width || 1.8 },
            itemStyle: { color: trace.line.color },
            smooth: 0.3,
            showSymbol: false,
        }))
    });

    // FRA Spread table columns
    const fraCols = [
        { key: 'leg1_front', label: 'Leg 1', format: v => v?.replace(' Comdty', '') },
        { key: 'leg2_front', label: 'Leg 2', format: v => v?.replace(' Comdty', '') },
        { key: 'fra1_rate', label: 'FRA 1', format: v => v?.toFixed(4) },
        { key: 'fra2_rate', label: 'FRA 2', format: v => v?.toFixed(4) },
        { key: 'spread_value', label: 'Spread', format: v => v?.toFixed(4), color: true },
        { key: 'spread_bps', label: 'Spread (bps)', format: v => v?.toFixed(2), color: true },
    ];

    return (
        <div>
            <div className="sub-tab-bar fade-in" style={{marginBottom: 16}}>
                {[3, 6, 9, 12, 24].map(t => (
                    <button key={t} className={`sub-tab-btn ${activeTenor === t ? 'active' : ''}`} onClick={() => setActiveTenor(t)}>
                        {t}M FRA
                    </button>
                ))}
            </div>

            <div className="metrics-row">
                <MetricCard label="Spread Nodes" value={countNodes} prefix="" className="fade-in fade-in-1" />
                <MetricCard label="Avg Spread" value={avgSpread} prefix="" className="fade-in fade-in-2" />
                <MetricCard label="Max Spread" value={maxSpread} prefix="" className="fade-in fade-in-3" />
                <MetricCard label="Min Spread" value={minSpread} prefix="" className="fade-in fade-in-4" />
            </div>

            {/* First Graph Block: FRA Spread + Fly Curves */}
            <div className="terminal-card fade-in fade-in-2">
                <div className="card-header">
                    <div className="card-title">
                        <span className="accent">|</span> {activeTenor}M FRA CURVES
                    </div>
                    <div className="card-actions">
                        <label className="toggle-switch" style={{marginRight: 16}}>
                            <input type="checkbox" checked={showHistoryCurves} onChange={e => setShowHistoryCurves(e.target.checked)} />
                            <span className="toggle-track" />
                            History
                        </label>
                        {countNodes > 0 && (
                            <div style={{ display: 'flex', alignItems: 'center', gap: 8, minWidth: 190, marginRight: 10 }}>
                                <span style={{ fontSize: 11, color: 'var(--text-muted)', whiteSpace: 'nowrap' }}>Contracts</span>
                                <input
                                    type="range"
                                    min="1"
                                    max={countNodes}
                                    step="1"
                                    value={Math.max(1, Math.min(contractWindow, countNodes))}
                                    onChange={e => setContractWindow(Number(e.target.value))}
                                    style={{ width: 120 }}
                                />
                                <span style={{ fontSize: 11, color: 'var(--text-secondary)', minWidth: 42, textAlign: 'right' }}>
                                    {visibleNodeCount}/{countNodes}
                                </span>
                            </div>
                        )}
                        <span style={{ fontSize: 11, color: 'var(--text-muted)', marginRight: 10 }}>As of: {spreadCurve?.date || params.date}</span>
                    </div>
                </div>

                {(loadingCurve && !spreads.length) ? (
                    <div style={{height: 300, display: 'flex', alignItems: 'center', justifyContent: 'center'}}><div className="spinner" /></div>
                ) : spreads.length > 0 ? (
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(420px, 1fr))', gap: 12 }}>
                        <ChartSurface
                            eyebrow="FRA Spread Strip"
                            title="Spread Curve"
                            note={`${visibleNodeCount}/${countNodes} visible nodes`}
                            actions={
                                <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                                    {spreadCurve?.date && (
                                        <button
                                            className="btn-export"
                                            style={{
                                                padding: '6px 10px',
                                                background: isCurrentSpreadPinned ? 'rgba(var(--accent-rgb), 0.18)' : undefined,
                                                borderColor: isCurrentSpreadPinned ? 'var(--accent)' : undefined,
                                                color: isCurrentSpreadPinned ? 'var(--text-accent)' : undefined
                                            }}
                                            onClick={handlePinCurrentSpreadCurve}
                                        >
                                            {isCurrentSpreadPinned ? 'Spread Pinned' : 'Pin Spread Graph'}
                                        </button>
                                    )}
                                    {activePinnedSpreads.length > 0 && (
                                        <button
                                            className="btn-export"
                                            style={{ padding: '6px 10px' }}
                                            onClick={() => setPinnedSpreadCurves(prev => prev.filter(p => !(p.tenor === activeTenor && p.fOnly === curveFOnlySpread)))}
                                        >
                                            Clear Spread Pins
                                        </button>
                                    )}
                                    <label className="toggle-switch">
                                        <input type="checkbox" checked={curveFOnlySpread} onChange={e => setCurveFOnlySpread(e.target.checked)} />
                                        <span className="toggle-track" />
                                        F-Only
                                    </label>
                                </div>
                            }
                        >
                            {activePinnedSpreads.length > 0 && (
                                <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, marginBottom: 8 }}>
                                    {activePinnedSpreads.map((pin, idx) => (
                                        <span
                                            key={`${pin.tenor}-${pin.fOnly}-${pin.date}`}
                                            style={{
                                                display: 'inline-flex',
                                                alignItems: 'center',
                                                gap: 6,
                                                fontSize: 11,
                                                color: 'var(--text-secondary)',
                                                border: `1px solid ${c.border}`,
                                                borderRadius: 999,
                                                padding: '4px 10px',
                                                background: 'rgba(0,0,0,0.22)'
                                            }}
                                        >
                                            <span style={{ width: 8, height: 8, borderRadius: '50%', background: getPinnedColor(idx), display: 'inline-block' }} />
                                            {`Pinned ${idx + 1}: ${pin.date}`}
                                        </span>
                                    ))}
                                </div>
                            )}
                            <EChart option={fraSpreadOption} style={{ height: 348 }} />
                        </ChartSurface>
                        <ChartSurface
                            eyebrow="FRA Fly Strip"
                            title="Fly Curve"
                            note={`${currentFlies.length} fly nodes`}
                            actions={
                                <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                                    <button
                                        className="btn-export"
                                        style={{
                                            padding: '6px 10px',
                                            background: isCurrentFlyPinned ? 'rgba(var(--accent-rgb), 0.18)' : undefined,
                                            borderColor: isCurrentFlyPinned ? 'var(--accent)' : undefined,
                                            color: isCurrentFlyPinned ? 'var(--text-accent)' : undefined
                                        }}
                                        onClick={handlePinCurrentFlyCurve}
                                    >
                                        {isCurrentFlyPinned ? 'Fly Pinned' : 'Pin Fly Graph'}
                                    </button>
                                    {activePinnedFlies.length > 0 && (
                                        <button
                                            className="btn-export"
                                            style={{ padding: '6px 10px' }}
                                            onClick={() => setPinnedFlyCurves(prev => prev.filter(p => !(p.tenor === activeTenor && p.fOnly === curveFOnlyFly)))}
                                        >
                                            Clear Fly Pins
                                        </button>
                                    )}
                                    <label className="toggle-switch">
                                        <input type="checkbox" checked={curveFOnlyFly} onChange={e => setCurveFOnlyFly(e.target.checked)} />
                                        <span className="toggle-track" />
                                        F-Only
                                    </label>
                                </div>
                            }
                        >
                            {activePinnedFlies.length > 0 && (
                                <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, marginBottom: 8 }}>
                                    {activePinnedFlies.map((pin, idx) => (
                                        <span
                                            key={`fly-${pin.tenor}-${pin.fOnly}-${pin.date}`}
                                            style={{
                                                display: 'inline-flex',
                                                alignItems: 'center',
                                                gap: 6,
                                                fontSize: 11,
                                                color: 'var(--text-secondary)',
                                                border: `1px solid ${c.border}`,
                                                borderRadius: 999,
                                                padding: '4px 10px',
                                                background: 'rgba(0,0,0,0.22)'
                                            }}
                                        >
                                            <span style={{ width: 8, height: 8, borderRadius: '50%', background: getPinnedColor(idx), display: 'inline-block' }} />
                                            {`Pinned Fly ${idx + 1}: ${pin.date}`}
                                        </span>
                                    ))}
                                </div>
                            )}
                            <EChart option={fraFlyOption} style={{ height: 348 }} />
                        </ChartSurface>
                    </div>
                ) : (
                    <div style={{height: 300, display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--text-muted)'}}>
                        No FRA spread data found for this tenor/date.
                    </div>
                )}
            </div>

            {/* Second Graph: Historical Generics */}
            <div className="terminal-card fade-in fade-in-3" style={{ marginTop: 16 }}>
                <div className="card-header">
                    <div className="card-title">
                        <span className="accent">|</span> GENERIC HISTORY ({activeTenor}M)
                    </div>
                    <div className="card-actions">
                        {(activeTenor === 12 || activeTenor === 24) && (
                            <label className="toggle-switch" style={{marginRight: 16}}>
                                <input type="checkbox" checked={histFOnly} onChange={e => setHistFOnly(e.target.checked)} />
                                <span className="toggle-track" />
                                F-Only
                            </label>
                        )}
                        <div style={{ display: 'flex', alignItems: 'center', background: 'rgba(0,0,0,0.5)', borderRadius: 4, overflow: 'hidden', border: `1px solid ${c.border}`, marginRight: 16 }}>
                            <button className={`sub-tab-btn ${genericRank === 'All' ? 'active' : ''}`} onClick={() => setGenericRank('All')} style={{padding: '4px 10px', fontSize: 10, border: 'none', background: 'none'}}>All</button>
                            <div style={{display: 'flex', alignItems: 'center', padding: '0 8px', borderLeft: `1px solid ${c.border}`}}>
                                <span style={{fontSize: 10, color: 'var(--text-muted)', marginRight: 4}}>Gen:</span>
                                <input 
                                    type="number" 
                                    min="1" max="10" 
                                    value={genericRank === 'All' ? '' : genericRank}
                                    onChange={e => setGenericRank(e.target.value ? parseInt(e.target.value) : 1)}
                                    style={{width: 36, fontSize: 10, background: 'rgba(0,0,0,0.3)', border: `1px solid ${c.grid}`, color: c.text, textAlign: 'center', borderRadius: 2}} 
                                />
                            </div>
                        </div>
                        <div style={{ display: 'flex', background: 'rgba(0,0,0,0.5)', borderRadius: 4, overflow: 'hidden', border: `1px solid ${c.border}` }}>
                            <button className={`sub-tab-btn ${historyMode === 'spreads' ? 'active' : ''}`} onClick={() => setHistoryMode('spreads')} style={{padding: '4px 10px', fontSize: 10, border: 'none', background: 'none'}}>Spreads</button>
                            <button className={`sub-tab-btn ${historyMode === 'flies' ? 'active' : ''}`} onClick={() => setHistoryMode('flies')} style={{padding: '4px 10px', fontSize: 10, border: 'none', background: 'none'}}>Flies</button>
                        </div>
                    </div>
                </div>
                
                {(loadingHist && !((historyMode === 'spreads' ? spreadHist : flyHist)?.length)) ? (
                    <div style={{height: 300, display: 'flex', alignItems: 'center', justifyContent: 'center'}}><div className="spinner" /></div>
                ) : (
                    <ChartSurface eyebrow="Rolling History" title="Generic History" note={`${historyMode === 'spreads' ? 'Spreads' : 'Flies'} • ${genericRank === 'All' ? 'All generics' : `Generic ${genericRank}`}`}>
                        <EChart option={fraHistoryOption} style={{ height: 394 }} />
                    </ChartSurface>
                )}
            </div>

            <DataTable data={spreads} columns={fraCols} title={`${activeTenor}M FRA Spread Table`} />
        </div>
    );
}

// ─── Sidebar Component ────────────────────────────────────────
function Sidebar({ params, setParams, collapsed, setCollapsed }) {
    const { isDark, toggleTheme } = useContext(ThemeContext);
    const [meta, setMeta] = useState(null);
    const [draftDate, setDraftDate] = useState(params?.date || '');

    useEffect(() => { api.metadata().then(setMeta); }, []);
    useEffect(() => { setDraftDate(params?.date || ''); }, [params?.date]);
    useEffect(() => {
        const maxDate = meta?.max_date ? toYMD(meta.max_date) : null;
        if (!maxDate || !params?.date) return;
        if (params.date > maxDate) {
            setParams(p => ({ ...p, date: maxDate }));
        }
    }, [meta?.max_date, params?.date]);

    const presets = [
        { label: '1W', days: 7 }, { label: '1M', days: 30 }, { label: '3M', days: 90 },
        { label: '6M', days: 180 }, { label: '1Y', days: 365 }, { label: '2Y', days: 504 },
    ];

    const shiftTargetDate = (unit, amount) => {
        if (!params?.date) return;
        const d = new Date(`${params.date}T00:00:00`);
        if (Number.isNaN(d.getTime())) return;
        if (unit === 'day') d.setDate(d.getDate() + amount);
        if (unit === 'month') d.setMonth(d.getMonth() + amount);
        if (meta?.max_date) {
            const maxD = new Date(`${toYMD(meta.max_date)}T00:00:00`);
            if (!Number.isNaN(maxD.getTime()) && d > maxD) d.setTime(maxD.getTime());
        }
        const yyyy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const dd = String(d.getDate()).padStart(2, '0');
        setParams(p => ({ ...p, date: `${yyyy}-${mm}-${dd}` }));
    };
    const maxDate = meta?.max_date ? toYMD(meta.max_date) : null;
    const atMaxDate = !!(maxDate && params?.date && params.date >= maxDate);

    return (
        <>
        <aside className={`sidebar ${collapsed ? 'collapsed' : ''}`}>
            <div className="sidebar-brand">
                <div className="icon">🛡️</div>
                <h1>BRAZIL DASHBOARD</h1>
                <p>Market Intelligence</p>
            </div>

            <div className="sidebar-section">
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '8px' }}>
                    <label style={{ marginBottom: 0 }}>📅 Target Date</label>
                    <button 
                        className="preset-btn" 
                        style={{ padding: '2px 8px', fontSize: '11px', marginTop: 0 }}
                        onClick={() => {
                            if (meta && meta.max_date) {
                                setParams(p => ({...p, date: toYMD(meta.max_date)}));
                            }
                        }}
                    >
                        Today
                    </button>
                </div>
                <input
                    type="date"
                    value={draftDate}
                    max={meta?.max_date ? toYMD(meta.max_date) : undefined}
                    onChange={e => setDraftDate(e.target.value)}
                    onKeyDown={e => {
                        if (e.key !== 'Enter') return;
                        const selected = draftDate;
                        const maxDate = meta?.max_date ? toYMD(meta.max_date) : null;
                        setParams(p => ({ ...p, date: (maxDate && selected > maxDate) ? maxDate : selected }));
                    }}
                />
                <div className="preset-row" style={{ marginTop: 8 }}>
                    <button className="preset-btn" onClick={() => shiftTargetDate('day', -1)}>-1D</button>
                    <button className="preset-btn" disabled={atMaxDate} onClick={() => shiftTargetDate('day', 1)}>+1D</button>
                    <button className="preset-btn" onClick={() => shiftTargetDate('month', -1)}>-1M</button>
                    <button className="preset-btn" disabled={atMaxDate} onClick={() => shiftTargetDate('month', 1)}>+1M</button>
                </div>
            </div>

            <div className="sidebar-section">
                <label>🔍 Lookback (days)</label>
                <input type="number" value={params.lookback} onChange={e => setParams(p => ({...p, lookback: Number(e.target.value)}))} min="1" />
                <div className="preset-row">
                    {presets.map(p => (
                        <button key={p.label} className={`preset-btn ${params.lookback === p.days ? 'active' : ''}`}
                            onClick={() => setParams(pr => ({...pr, lookback: p.days}))}>
                            {p.label}
                        </button>
                    ))}
                </div>
            </div>

            <div className="sidebar-section">
                <label>Horizon Windows</label>
                <div className="sidebar-row">
                    <div><label>n1</label><input type="number" value={params.n1} onChange={e => setParams(p => ({...p, n1: Number(e.target.value)}))} min="1" /></div>
                    <div><label>n2</label><input type="number" value={params.n2} onChange={e => setParams(p => ({...p, n2: Number(e.target.value)}))} min="1" /></div>
                    <div><label>n3</label><input type="number" value={params.n3} onChange={e => setParams(p => ({...p, n3: Number(e.target.value)}))} min="1" /></div>
                </div>
            </div>

            {meta && (
                <div className="db-info">
                    <div className="db-title">Database Info</div>
                    <div>
                        <div>{meta.total_records?.toLocaleString()} records</div>
                        <div>{meta.total_contracts} contracts</div>
                        <div>{meta.min_date?.slice(0,10)} → {meta.max_date?.slice(0,10)}</div>
                    </div>
                </div>
            )}

            <div className="theme-toggle">
                <button onClick={toggleTheme}>
                    {isDark ? '☀️ Light Mode' : '🌙 Dark Mode'}
                </button>
            </div>
        </aside>
        <button className="sidebar-toggle" onClick={() => setCollapsed(!collapsed)}>
            {collapsed ? '☰' : '✕'}
        </button>
        </>
    );
}

// ─── App Component ────────────────────────────────────────────
function App() {
    const [isDark, setIsDark] = useState(true);
    const [activeTab, setActiveTab] = useState(0);
    const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
    const [params, setParams] = useState({
        date: new Date().toISOString().slice(0, 10),
        lookback: 252, n1: 5, n2: 21, n3: 63,
    });

    useEffect(() => {
        api.metadata().then(meta => {
            if (meta.max_date) setParams(p => ({...p, date: toYMD(meta.max_date)}));
        });
    }, []);

    const toggleTheme = () => {
        setIsDark(!isDark);
        document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
    };

    const tabs = [
        { label: '💎 DVO1', component: <DVO1Tab params={params} /> },
        { label: '📑 FRA', component: <FRATab params={params} /> },
        { label: '📖 Guide', component: <GuideTab /> },
    ];

    return (
        <ThemeContext.Provider value={{ isDark, toggleTheme }}>
            <div className="app-container">
                <Sidebar params={params} setParams={setParams} collapsed={sidebarCollapsed} setCollapsed={setSidebarCollapsed} />
                <main className={`main-content ${sidebarCollapsed ? 'expanded' : ''}`}>
                    <div className="tab-bar">
                        {tabs.map((tab, i) => (
                            <button key={i} className={`tab-btn ${activeTab === i ? 'active' : ''}`} onClick={() => setActiveTab(i)}>
                                {tab.label}
                            </button>
                        ))}
                    </div>
                    {tabs[activeTab].component}
                </main>
            </div>
        </ThemeContext.Provider>
    );
}

// ─── Mount ────────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
